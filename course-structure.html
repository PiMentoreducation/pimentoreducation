<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><img src="/images/OUR_LOGO.png"> Content | PiMentor</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 1. THEME VARIABLES (Galactic & Meadow) --- */
        :root {
            --bg: radial-gradient(circle at top, #0d1117 0%, #010409 100%);
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --card-border: rgba(255, 255, 255, 0.1);
            --folder-bg: rgba(124, 77, 255, 0.15);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        [data-theme="light"] {
            --bg: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 40%, #A8E063 100%);
            --text: #1b4332;
            --accent: #2d6a4f;
            --glass: rgba(255, 255, 255, 0.85);
            --card-border: rgba(45, 106, 79, 0.2);
            --folder-bg: rgba(45, 106, 79, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.4s, color 0.4s; }
        body { background: var(--bg); background-attachment: fixed; color: var(--text); overflow-x: hidden; min-height: 100vh; }

        /* --- STARDUST BACKGROUND --- */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; z-index: -1;
        }

        /* --- NAVIGATION --- */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 80px; z-index: 1000;
            display: flex; align-items: center; padding: 0 5%;
            background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
        }

        .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; z-index: 1001; }
        .logo-img { height: 45px; width: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
        .logo-text { font-size: 1.5rem; font-weight: 800; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-links { display: flex; gap: 20px; align-items: center; margin-left: auto; }
        .nav-links a { text-decoration: none; color: inherit; font-weight: 600; opacity: 0.9; font-size: 0.9rem; transition: 0.3s; }
        
        /* --- NEW THEME BOX DESIGN --- */
        .theme-box {
            display: flex; align-items: center; gap: 10px; padding: 8px 15px;
            background: var(--glass); border: 1px solid var(--accent);
            border-radius: 12px; cursor: pointer; transition: 0.3s;
            font-weight: 700; font-size: 0.85rem;
        }
        .theme-box:hover { background: rgba(124, 77, 255, 0.1); box-shadow: 0 0 15px var(--accent-glow); }

        /* --- MOBILE HAMBURGER & SIDEBAR --- */
        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; z-index: 1002; }
        .hamburger span { width: 28px; height: 3px; background: var(--text); border-radius: 2px; }

        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: var(--bg); backdrop-filter: blur(25px);
            z-index: 2000; transition: 0.4s ease; padding: 40px 30px; border-right: 1px solid var(--accent);
        }
        .sidebar.open { left: 0; }
        .sidebar-links { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        .sidebar-links a { color: var(--text); text-decoration: none; font-size: 1.1rem; font-weight: 700; transition: 0.3s; }

        @media (max-width: 1024px) {
            .nav-links { display: none; }
            .hamburger { display: flex; order: -1; margin-right: 15px; }
            .brand { margin-right: auto; }
            .navbar { padding: 0 20px; }
        }

        /* --- CONTENT LAYOUT --- */
        .container { max-width: 850px; margin: 120px auto 40px; padding: 0 20px; }
        .header-box { 
            background: var(--glass); padding: 35px; border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 30px;
            backdrop-filter: blur(10px); border: 1px solid var(--card-border);
            border-left: 8px solid var(--accent);
        }
        .chapter-list { display: flex; flex-direction: column; gap: 15px; }
        .chapter-card {
            background: var(--glass); padding: 20px 30px; border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; transition: var(--transition);
            border: 1px solid var(--card-border); text-decoration: none; color: inherit;
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>

    <a href="/index.html" class="brand">
        <img src="/images/OUR_LOGO.png" class="logo-img" alt="Logo">
        <div class="logo-text">PiMentor</div>
    </a>
    
    <nav class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/courses.html">All Courses</a>
        <a href="/pishot_hub.html">PiShot</a>
        <a href="/community.html">Community</a>
        <a href="/support.html">Contact Us</a>
        
        <label class="switch" style="margin-left: 15px;">
            <input type="checkbox" id="themeToggleNav" checked>
            <span class="slider-round"></span>
        </label>
    </nav>
</header>

<aside class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div class="logo-text" style="-webkit-text-fill-color: var(--text);">Menu</div>
        <button id="closeSidebar" style="background:none; border:none; color:var(--text); font-size:2.5rem; cursor:pointer;">&times;</button>
    </div>
    
    <div class="theme-switch-wrapper" style="display:flex; justify-content:space-between; align-items:center; padding-bottom:20px; border-bottom:1px solid var(--card-border);">
        <span style="font-weight:700;">Dark Mode</span>
        <label class="switch">
            <input type="checkbox" id="themeToggleSidebar" checked>
            <span class="slider-round"></span>
        </label>
    </div>

    <nav class="sidebar-links">
        <a href="/index.html">Home</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/courses.html">All Courses</a>
        <a href="/pishot_hub.html">PiShot</a>
        <a href="/community.html">Community</a>
        <a href="/support.html">Contact Us</a>
    </nav>
</aside>

<script>
    const token = localStorage.getItem("token");
    const themeToggles = [document.getElementById("themeToggleNav"), document.getElementById("themeToggleSidebar")];
    const sidebar = document.getElementById("sidebar");
    const hamburger = document.getElementById("hamburger");
    const closeSidebar = document.getElementById("closeSidebar");
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('id');

    // --- SIDEBAR LOGIC ---
    hamburger.onclick = () => sidebar.classList.add('open');
    closeSidebar.onclick = () => sidebar.classList.remove('open');

    // --- THEME MANAGEMENT (Green Tree Light Mode) ---
    const applyTheme = (theme) => {
        document.documentElement.setAttribute("data-theme", theme);
        const isDark = theme === "dark";
        themeToggles.forEach(t => { if(t) t.checked = isDark; });
        localStorage.setItem("pimentor-theme", theme);
    };

    applyTheme(localStorage.getItem("pimentor-theme") || "dark");
    themeToggles.forEach(t => { 
        if(t) t.onchange = () => applyTheme(t.checked ? 'dark' : 'light'); 
    });

    // --- FIXED CURRICULUM FETCHING ---
    async function loadChapters() {
        const container = document.getElementById("chapterContainer");
        if (!courseId) {
            container.innerHTML = `<div class="loading-text">Error: Course ID missing.</div>`;
            return;
        }

        try {
            // URL matches authRoutes.js
            const res = await fetch(`https://pimentor-project.onrender.com/api/auth/courses/${courseId}/lectures`, {
                headers: { "Authorization": "Bearer " + token }
            });

            const data = await res.json();

            // Correctly access data.lectures based on your backend
            if (data.success && data.lectures) {
                if (data.lectures.length === 0) {
                    container.innerHTML = `<div class="loading-text">No lectures available yet.</div>`;
                    return;
                }

                container.innerHTML = data.lectures.map((lecture, index) => `
                    <a href="/lecture-player.html?courseId=${courseId}&lectureId=${lecture._id}" class="chapter-card">
                        <div class="chapter-info">
                            <div class="folder-icon">${index + 1}</div>
                            <div class="chapter-name">${lecture.title}</div>
                        </div>
                        <div class="arrow">→</div>
                    </a>
                `).join('');
            } else {
                container.innerHTML = `<div class="loading-text">Unable to sync curriculum.</div>`;
            }

        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="loading-text">Server connection error.</div>`;
        }
    }

    document.addEventListener("DOMContentLoaded", loadChapters);
</script>
</body>
</html>
