<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard | PiMentor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
        /* DARK MODE (GALACTIC) */
        --space-bg: radial-gradient(circle at top, #0d1117 0%, #010409 100%);
        --accent: #7c4dff;
        --accent-glow: rgba(124, 77, 255, 0.4);
        --glass: rgba(255, 255, 255, 0.05);
        --text: #ffffff;
        --card-border: rgba(255, 255, 255, 0.1);
        --danger: #ff4d4d;
        --warning: #f39c12;
        --success: #2ecc71;
        --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    /* LIGHT MODE (RISING SUN GRASSLAND) */
    [data-theme="light"] {
        --space-bg: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 40%, #A8E063 100%);
        --accent: #2d6a4f; /* Deep Leaf Green */
        --accent-glow: rgba(45, 106, 79, 0.2);
        --glass: rgba(255, 255, 255, 0.85); /* Solid readability */
        --text: #1b4332;
        --card-border: rgba(45, 106, 79, 0.2);
        --success: #1b4332;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background: var(--space-bg); background-attachment: fixed; color: var(--text); overflow-x: hidden; transition: 0.5s; min-height: 100vh; }

    /* BACKGROUND DECOR */
    body::before {
        content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: url('https://www.transparenttextures.com/patterns/stardust.png');
        opacity: 0.2; z-index: -1;
    }

    /* LIGHT MODE DECOR (SUN & TREE) */
    [data-theme="light"] body::after {
        content: "☀️"; position: fixed; top: 10%; right: 10%; font-size: 80px; filter: blur(15px); opacity: 0.4; z-index: -1;
    }
    .grass-tree {
        display: none; position: fixed; bottom: 0; left: 5%; font-size: 150px; z-index: -1; opacity: 0.3;
    }
    [data-theme="light"] .grass-tree { display: block; }

    /* --- NAVIGATION --- */
    .navbar {
        position: fixed; top: 0; width: 100%; height: 80px; z-index: 1000;
        display: flex; align-items: center; padding: 0 5%;
        background: var(--glass); backdrop-filter: blur(15px);
        border-bottom: 1px solid var(--card-border);
    }

    .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; }
.logo-img { 
        height: 45px; 
        width: 45px; /* Added width to ensure perfect circle */
        border-radius: 50%; /* This creates the circular border */
        object-fit: cover; /* Prevents stretching */
        border: 2px solid var(--accent); /* Added a thin border to define the circle */
        filter: drop-shadow(0 0 8px var(--accent));}
    .logo-text { font-size: 1.5rem; font-weight: 800; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .nav-links { display: flex; gap: 30px; align-items: center; margin-left: auto; }
    .nav-links a { text-decoration: none; color: inherit; font-weight: 600; opacity: 0.9; }
    .logout-btn-desktop { color: var(--danger) !important; border: 1.5px solid var(--danger); padding: 6px 15px; border-radius: 20px; text-decoration: none; font-weight: 700; transition: 0.3s; }
    .logout-btn-desktop:hover { background: var(--danger); color: white !important; }

    /* --- MOBILE LOGIC (BRAND TO RIGHT) --- */
    .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; }
    .hamburger span { width: 28px; height: 3px; background: var(--text); border-radius: 2px; }

    @media (max-width: 900px) {
        .nav-links { display: none; }
        .hamburger { display: flex; margin-right: auto; } /* Burger Left */
        .brand { margin-left: auto; } /* Logo Right */
    }

    /* --- SIDEBAR --- */
    .sidebar {
        position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
        background: var(--glass); backdrop-filter: blur(25px);
        z-index: 2000; transition: 0.4s ease; padding: 40px 30px; border-right: 1px solid var(--accent);
    }
    .sidebar.open { left: 0; }
    .sidebar-links { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
    .sidebar-links a { color: var(--text); text-decoration: none; font-size: 1.1rem; font-weight: 700; }

    /* --- THEME SWITCH --- */
    .theme-switch-wrapper { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--card-border); }
    .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider-round { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
    .slider-round:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider-round { background-color: var(--accent); }
    input:checked + .slider-round:before { transform: translateX(24px); }

    /* --- CONTENT CARDS --- */
    .dashboard-container { max-width: 1150px; margin: 100px auto 40px; padding: 0 20px; }
    section { background: var(--glass); border: 1px solid var(--card-border); border-radius: 24px; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
    h2 { font-size: 1.1rem; margin-bottom: 20px; color: var(--accent); border-bottom: 1px solid var(--card-border); padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

    .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
    .course-card { background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); padding: 25px; border-radius: 20px; transition: var(--transition); position: relative; }
    [data-theme="light"] .course-card { background: rgba(255,255,255,0.5); }
    .course-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    
    .status-tag { font-size: 0.75rem; font-weight: 800; padding: 5px 12px; border-radius: 6px; text-transform: uppercase; display: inline-block; margin-bottom: 15px; }
    .tag-active { background: rgba(40, 167, 69, 0.2); color: #2ecc71; }
    .tag-expired { background: rgba(220, 53, 69, 0.2); color: var(--danger); }
    
    .price-badge { position: absolute; top: 25px; right: 25px; font-weight: 800; color: #2ecc71; font-size: 1rem; }
    
    .btn-main { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; font-size: 0.95rem; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: var(--text); border: 1.5px solid var(--card-border); }
    .btn-renew { background: var(--warning); color: #000; }

    .notif-card { background: var(--accent-glow); border: 1px solid var(--accent); padding: 20px; border-radius: 18px; margin-bottom: 15px; position: relative; animation: slideDown 0.5s ease; }
    .close-notif { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 1.4rem; font-weight: bold; }
    
    @keyframes slideDown { from { opacity: 0; transform: translateY(-15px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="grass-tree">🌳</div>

<header class="navbar">
    <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </div>

    <div class="brand" onclick="window.location.href='index.html'">
        <img src="/images/OUR_LOGO.png" class="logo-img" alt="pimentor">
        <div class="logo-text">PiMentor</div>
    </div>

    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="courses.html">All Courses</a>
        <a href="#" id="logoutBtnDesktop" class="logout-btn-desktop">Logout</a>
    </nav>
</header>

<aside class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div class="logo-text" style="-webkit-text-fill-color: var(--text);">Menu</div>
        <button id="closeSidebar" style="background:none; border:none; color:var(--text); font-size:2.5rem; cursor:pointer;">&times;</button>
    </div>
    
    <div class="theme-switch-wrapper">
        <span style="font-weight:700;">Dark Theme</span>
        <label class="switch">
            <input type="checkbox" id="themeToggle" checked>
            <span class="slider-round"></span>
        </label>
    </div>

    <nav class="sidebar-links">
        <a href="index.html">Home</a>
        <a href="courses.html">All Courses</a>
        <div style="margin-top:auto; padding-top:20px; border-top:1px solid var(--card-border);">
            <a href="#" id="logoutBtnMobile" style="color:var(--danger); font-weight: 800;">Logout</a>
        </div>
    </nav>
</aside>

<div class="dashboard-container">
    <div id="notif-wrapper"><div id="notif-container"></div></div>

    <h1 style="margin-bottom: 30px;">Hello, <span id="welcomeName" style="color: var(--accent);">Student</span> 👋</h1>

    <section class="profile-card">
        <h2>Student Profile</h2>
        <div style="line-height: 2;">
            <p><strong>Name:</strong> <span id="profileName"></span></p>
            <p><strong>Email:</strong> <span id="profileEmail"></span></p>
            <p><strong>Current Class:</strong> <span id="studentClass">Loading...</span></p>
        </div>
        <button class="btn-main" style="width:auto; padding:12px 30px; margin-top:25px;" onclick="window.location.href='courses.html'">+ Explore More Courses</button>
    </section>

    <section>
        <h2>Your Learning Path</h2>
        <div id="courseList" class="course-grid">
            <p style="opacity: 0.6;">Scanning your learning dimension...</p>
        </div>
    </section>

    <section>
        <h2>📬 Mentor Support & Doubts</h2>
        <div id="dashboardDoubtsContainer">
            <p style="opacity: 0.6;">Checking for mentor responses...</p>
        </div>
    </section>
</div>

<script>
    const BASE_URL = "https://pimentor-project.onrender.com";
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user") || "{}");

    // --- NEW: SESSION & RESPONSE INTERCEPTOR ---
    // This handles the "Single Session" kick-out logic globally for the dashboard
    async function handleResponse(response) {
        const data = await response.json();
        
        // If the backend sent the "CONCURRENT_LOGIN" code from our middleware
        if (response.status === 401 && data.code === "CONCURRENT_LOGIN") {
            alert("⚠️ Session Terminated: You have been logged in on another device.");
            localStorage.clear(); 
            window.location.href = "login.html"; 
            return null; 
        }
        
        if (!response.ok) {
            throw new Error(data.message || "Something went wrong");
        }
        
        return data;
    }

    // SideBar & Theme Controls
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const closeSidebar = document.getElementById('closeSidebar');
    const themeToggle = document.getElementById('themeToggle');

    hamburger.onclick = () => sidebar.classList.add('open');
    closeSidebar.onclick = () => sidebar.classList.remove('open');

    const applyTheme = (theme) => {
        document.documentElement.setAttribute("data-theme", theme);
        themeToggle.checked = (theme === 'dark');
        localStorage.setItem('pimentor-theme', theme);
    };
    applyTheme(localStorage.getItem('pimentor-theme') || 'dark');
    themeToggle.onchange = () => applyTheme(themeToggle.checked ? 'dark' : 'light');

    // Logout Functionality
    const logout = () => { localStorage.clear(); window.location.href = "login.html"; };
    document.getElementById("logoutBtnDesktop").onclick = logout;
    document.getElementById("logoutBtnMobile").onclick = logout;

    document.addEventListener("DOMContentLoaded", () => {
        if (!token) { window.location.href = "login.html"; return; }
        document.getElementById("welcomeName").innerText = user.name || "Student";
        document.getElementById("profileName").innerText = user.name || "N/A";
        document.getElementById("profileEmail").innerText = user.email || "N/A";
        document.getElementById("studentClass").innerText = user.studentClass || "N/A";
        
        fetchNotifications();
        loadStudentCourses();
        loadDashboardDoubts();
    });

    async function fetchNotifications() {
        const container = document.getElementById("notif-container");
        let dismissed = JSON.parse(localStorage.getItem("dismissedNotifs") || "[]");
        try {
            const [pRes, nRes] = await Promise.all([
                fetch(`${BASE_URL}/api/purchase/my-courses`, { headers: { "Authorization": "Bearer " + token } }),
                fetch(`${BASE_URL}/api/purchase/active-notifications`, { headers: { "Authorization": "Bearer " + token } })
            ]);

            // Using the new interceptor logic for safety
            const myPurchasedData = await handleResponse(pRes);
            const allNotifs = await handleResponse(nRes);
            
            if(!myPurchasedData || !allNotifs) return;

            const myPurchasedIds = myPurchasedData.map(c => c.courseId);
            
            const filtered = allNotifs.filter(n => {
                const matchesCourse = n.targetCourses.some(id => myPurchasedIds.includes(id));
                const matchesClass = n.targetCourses.includes(user.studentClass);
                const isGlobal = n.targetCourses.includes("all") || n.targetCourses.length === 0;
                return (matchesCourse || matchesClass || isGlobal) && !dismissed.includes(n._id);
            });

            container.innerHTML = filtered.map(n => `
                <div class="notif-card" id="notif-${n._id}">
                    <span class="close-notif" onclick="dismissNotif('${n._id}')">×</span>
                    <h3>📢 ${n.heading}</h3>
                    <p>${n.description}</p>
                    ${n.link ? `<br><a href="${n.link}" target="_blank" style="color:var(--accent); font-weight:800; text-decoration:none;">View Details →</a>` : ''}
                </div>`).join('');
        } catch (err) { console.error("Notification load failed", err); }
    }

    window.dismissNotif = (id) => {
        let dismissed = JSON.parse(localStorage.getItem("dismissedNotifs") || "[]");
        dismissed.push(id);
        localStorage.setItem("dismissedNotifs", JSON.stringify(dismissed));
        const el = document.getElementById(`notif-${id}`);
        if(el) el.remove();
    };

    async function loadStudentCourses() {
        const container = document.getElementById("courseList");
        try {
            const [pRes, cRes] = await Promise.all([
                fetch(`${BASE_URL}/api/purchase/my-courses`, { 
                    headers: { "Authorization": "Bearer " + token } 
                }),
                fetch(`${BASE_URL}/api/purchase/all-courses`, { 
                    headers: { "Authorization": "Bearer " + token } 
                })
            ]);

            // Integrated single-session validation check
            const purchases = await handleResponse(pRes);
            const allMetadata = await handleResponse(cRes);

            if (!purchases || !allMetadata) return;

            const now = new Date();

            const latest = {};
            purchases.forEach(p => { 
                const cid = String(p.courseId).trim();
                if(!latest[cid] || new Date(p.createdAt) > new Date(latest[cid].createdAt)) {
                    latest[cid] = p;
                }
            });

            const purchaseValues = Object.values(latest);
            
            if (purchaseValues.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; opacity: 0.7;">
                        <p>No active missions found in your learning galaxy.</p>
                        <button class="btn-main" style="width:auto; margin-top:15px;" onclick="window.location.href='courses.html'">Start Learning →</button>
                    </div>`;
                return;
            }

            container.innerHTML = purchaseValues.map(p => {
                const expiry = new Date(p.expiryDate);
                const isExpired = now > expiry;
                const diffTime = expiry - now;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                const meta = allMetadata.find(m => String(m.courseId).trim() === String(p.courseId).trim()) || {};
                const currentPrice = meta.price || p.price || "N/A";

                return `
                    <div class="course-card">
                        <span class="status-tag ${isExpired ? 'tag-expired' : 'tag-active'}">
                            ${isExpired ? 'Access Expired' : 'Active Mission'}
                        </span>
                        <h3 style="margin-bottom:12px;">${p.title || meta.title || 'Course'}</h3>
                        
                        <div style="margin: 15px 0; font-size: 0.9rem;">
                            <p style="color: ${isExpired ? 'var(--danger)' : (diffDays < 7 ? 'var(--warning)' : 'var(--success)')}; font-weight: 800;">
                                ${isExpired ? 'Mission Ended' : diffDays + ' Days Remaining'}
                            </p>
                            <p style="opacity:0.7; margin-top:8px;">📅 Enrolled: ${new Date(p.createdAt).toLocaleDateString()}</p>
                            <p style="opacity:0.7;">⏳ Valid Until: ${expiry.toLocaleDateString()}</p>
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 10px;">
                            <button class="btn-main btn-secondary" onclick="window.location.href='course-desc.html?id=${p.courseId}'">Course Details</button>
                            
                            ${isExpired ? 
                              `<button class="btn-main btn-renew" onclick="window.location.href='courses.html?renew=${p.courseId}'">Renew Access (₹${currentPrice})</button>` : 
                              `<button class="btn-main" onclick="window.location.href='course-structure.html?id=${p.courseId}'">Enter Classroom →</button>`
                            }
                        </div>
                    </div>`;
            }).join('');
        } catch (e) { 
            console.error("Critical Dashboard Sync Failure:", e);
            container.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; color: var(--danger); padding: 20px; background: rgba(255,0,0,0.05); border-radius: 15px;">
                    <strong>Synchronization Error</strong>
                    <p style="font-size: 0.8rem; margin-top: 5px;">We couldn't connect to your learning profile. Please try logging in again.</p>
                    <button class="btn-main" style="width:auto; background: var(--text); color: var(--bg); margin-top:15px;" onclick="location.reload()">Retry Sync</button>
                </div>`;
        }
    }

    async function loadDashboardDoubts() {
        const container = document.getElementById("dashboardDoubtsContainer");
        try {
            const res = await fetch(`${BASE_URL}/api/purchase/my-dashboard-doubts`, { 
                headers: { "Authorization": "Bearer " + token } 
            });
            
            const doubts = await handleResponse(res);
            if(!doubts) return;
            
            if(!doubts.length) { 
                container.innerHTML = "<p style='opacity:0.6;'>No mentor interactions found in your orbit.</p>"; 
                return; 
            }

            container.innerHTML = doubts.map(d => `
                <div style="background:rgba(255,255,255,0.04); border:1.5px solid var(--card-border); padding:20px; border-radius:18px; margin-bottom:15px;">
                    <div style="font-size:0.8rem; color:var(--accent); font-weight:800; margin-bottom:8px; text-transform:uppercase;">${d.lectureTitle || 'General Support'}</div>
                    <strong style="font-size:1rem;">Q: ${d.question}</strong>
                    <div style="margin-top:12px; padding-top:12px; border-top:1.5px solid rgba(255,255,255,0.05); color: #cfcfcf;">
                        ${d.answer ? `🎯 Mentor Response: ${d.answer}` : "⏳ A mentor is reviewing your query..."}
                    </div>
                </div>`).join('');
        } catch (e) { container.innerHTML = "<p>Support inbox temporarily offline.</p>"; }
    }
</script>
</body>
</html>
