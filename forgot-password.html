<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | PiMentor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 1. GALACTIC & MEADOW THEME VARIABLES --- */
        :root {
            --bg: radial-gradient(circle at top, #0d1117 0%, #010409 100%);
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --card-border: rgba(255, 255, 255, 0.1);
            --danger: #ff4d4d;
            --success: #4CAF50;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        [data-theme="light"] {
            --bg: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 40%, #A8E063 100%);
            --text: #1b4332;
            --accent: #2d6a4f;
            --glass: rgba(255, 255, 255, 0.85);
            --card-border: rgba(45, 106, 79, 0.2);
            --success: #2d6a4f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s ease; }
        body { background: var(--bg); background-attachment: fixed; color: var(--text); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

        /* --- STARDUST BACKGROUND --- */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; z-index: -1;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 80px; z-index: 1000;
            display: flex; align-items: center; padding: 0 5%;
            background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
        }
        .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; margin-right: auto; text-decoration: none; }
        .logo-img { height: 45px; width: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
        .logo-text { font-size: 1.5rem; font-weight: 800; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { text-decoration: none; color: inherit; font-weight: 600; opacity: 0.8; }

        /* --- MOBILE DRAWER --- */
        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; margin-right: 20px; }
        .hamburger span { width: 28px; height: 3px; background: var(--text); border-radius: 2px; }
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: var(--glass); backdrop-filter: blur(25px);
            z-index: 2000; transition: 0.4s ease; padding: 40px 30px; border-right: 1px solid var(--accent);
        }
        .sidebar.open { left: 0; }
        .sidebar-links { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        .sidebar-links a { color: var(--text); text-decoration: none; font-size: 1.1rem; font-weight: 700; }

        /* --- AUTH CARD STYLING --- */
        .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 100px 20px 40px; }
        .auth-card { 
            background: var(--glass); padding: 40px; border-radius: 25px; 
            width: 100%; max-width: 450px; backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .auth-card h1 { margin-bottom: 10px; font-size: 1.8rem; }
        .auth-card p { opacity: 0.7; margin-bottom: 25px; font-size: 0.9rem; }

        /* --- ORIGINAL INPUT GROUP STYLING (Retained) --- */
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .input-group input { flex: 1.5; margin-bottom: 0 !important; }
        .auth-card form input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--card-border);
            background: rgba(255,255,255,0.05); color: var(--text); font-size: 1rem;
        }
        [data-theme="light"] .auth-card form input { background: #fff; }

        .btn-small { 
            flex: 1; height: 45px; cursor: pointer; background: var(--success); 
            color: white; border: none; border-radius: 10px; font-size: 0.85rem;
            white-space: nowrap; font-weight: bold;
        }
        button:disabled { background-color: #666 !important; cursor: not-allowed; opacity: 0.5; }

        #otp-section, #reset-section { 
            display: none; border-top: 1px dashed var(--card-border); 
            padding-top: 20px; margin-top: 15px; 
        }

        .switch a { color: var(--accent); text-decoration: none; font-weight: bold; }

        /* --- THEME TOGGLE (Sidebar) --- */
        .theme-switch-wrapper { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--card-border); }
        .switch-toggle { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch-toggle input { opacity: 0; width: 0; height: 0; }
        .slider-round { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider-round:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider-round { background-color: var(--accent); }
        input:checked + .slider-round:before { transform: translateX(24px); }

        @media (max-width: 900px) {
            .nav-links { display: none; }
            .hamburger { display: flex; order: -1; margin-right: auto; }
            .brand { margin-right: 0; margin-left: auto; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </div>
    <a href="/index.html" class="brand">
        <img src="/images/OUR_LOGO.png" class="logo-img" alt="pimentor">
        <div class="logo-text">PiMentor</div>
    </a>
    <nav class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/login.html">Login</a>
    </nav>
</header>

<aside class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div class="logo-text" style="-webkit-text-fill-color: var(--text);">Menu</div>
        <button id="closeSidebar" style="background:none; border:none; color:var(--text); font-size:2.5rem; cursor:pointer;">&times;</button>
    </div>
    <div class="theme-switch-wrapper">
        <span style="font-weight:700;">Dark Theme</span>
        <label class="switch-toggle">
            <input type="checkbox" id="themeToggle" checked>
            <span class="slider-round"></span>
        </label>
    </div>
    <nav class="sidebar-links">
        <a href="/index.html">Home</a>
        <a href="/login.html">Login</a>
    </nav>
</aside>

<div class="auth-container">
    <div class="auth-card">
        <h1>Reset Password</h1>
        <p>Enter your registered email to receive an OTP</p>

        <form id="forgotForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="Registered Email" required>
                <button type="button" id="sendBtn" class="btn-small" onclick="handleSendOTP()">Send OTP</button>
            </div>

            <div id="otp-section">
                <div class="input-group">
                    <input type="text" id="otp-input" placeholder="6-Digit OTP" maxlength="6">
                    <button type="button" class="btn-small" onclick="handleVerifyOTP()" style="background:#2196F3;">Verify Code</button>
                </div>
            </div>

            <div id="reset-section">
                <input type="password" id="new-password" placeholder="Enter New Password" required minlength="6">
                <button type="submit" id="updateBtn" class="btn-small" style="width:100%; background:#f44336; margin-top:15px;">Update Password</button>
            </div>
        </form>
        <p class="switch" style="margin-top:20px;"><a href="/login.html">Back to Login</a></p>
    </div>
</div>

<script>
/* --- SIDEBAR & THEME LOGIC --- */
const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');
const closeSidebar = document.getElementById('closeSidebar');
const themeToggle = document.getElementById('themeToggle');

hamburger.onclick = () => sidebar.classList.add('open');
closeSidebar.onclick = () => sidebar.classList.remove('open');

const setTheme = (theme) => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('pimentor-theme', theme);
    themeToggle.checked = theme === 'dark';
};

const savedTheme = localStorage.getItem('pimentor-theme') || 'dark';
setTheme(savedTheme);

themeToggle.addEventListener('change', () => {
    setTheme(themeToggle.checked ? 'dark' : 'light');
});

/* --- ORIGINAL OTP & RESET LOGIC (Retained Exactly) --- */
const BASE_URL = "https://pimentor-project.onrender.com";
let timerOn = false;

function startTimer(remaining) {
    const sendBtn = document.getElementById('sendBtn');
    timerOn = true;
    const interval = setInterval(() => {
        remaining -= 1;
        sendBtn.innerText = `${remaining}s`;
        sendBtn.disabled = true;
        if (remaining <= 0) {
            clearInterval(interval);
            sendBtn.innerText = "Resend";
            sendBtn.disabled = false;
            timerOn = false;
        }
    }, 1000);
}

async function handleSendOTP() {
    if (timerOn) return;
    const email = document.getElementById('email').value;
    const btn = document.getElementById('sendBtn');
    if (!email) return alert("Please enter your registered email.");
    try {
        btn.disabled = true; btn.innerText = "...";
        const res = await fetch(`${BASE_URL}/api/auth/send-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, type: 'forgot' })
        });
        const data = await res.json();
        if (res.ok) {
            alert("OTP sent to your email!");
            document.getElementById('otp-section').style.display = 'block';
            startTimer(60);
        } else {
            alert(data.message || "Error sending OTP.");
            btn.disabled = false; btn.innerText = "Send OTP";
        }
    } catch (err) { 
        alert("Server error. Check if backend is running."); 
        btn.disabled = false; btn.innerText = "Send OTP";
    }
}

async function handleVerifyOTP() {
    const email = document.getElementById('email').value;
    const otp = document.getElementById('otp-input').value;
    if (!otp) return alert("Enter the 6-digit code.");
    try {
        const res = await fetch(`${BASE_URL}/api/auth/verify-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, otp })
        });
        const data = await res.json();
        if (data.success) {
            alert("Verified! Now set your new password.");
            document.getElementById('otp-section').style.display = 'none';
            document.getElementById('sendBtn').style.display = 'none';
            document.getElementById('email').readOnly = true;
            document.getElementById('reset-section').style.display = 'block';
        } else { alert(data.message); }
    } catch (err) { alert("Verification failed."); }
}

document.getElementById("forgotForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const newPassword = document.getElementById('new-password').value;
    const updateBtn = document.getElementById('updateBtn');
    updateBtn.disabled = true; updateBtn.innerText = "Updating...";
    try {
        const res = await fetch(`${BASE_URL}/api/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, newPassword })
        });
        const data = await res.json();
        if (res.ok) {
            alert("Password updated successfully! Please login.");
            window.location.href = "login.html";
        } else {
            alert(data.message || "Reset failed.");
            updateBtn.disabled = false; updateBtn.innerText = "Update Password";
        }
    } catch (err) { 
        alert("Reset failed. Connection error."); 
        updateBtn.disabled = false; updateBtn.innerText = "Update Password";
    }
});
</script>
</body>
</html>
