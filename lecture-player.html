<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learning Player | PiMentor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            options: { enableMenu: false }
        };
    </script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --space-bg: radial-gradient(circle at top, #0d1117 0%, #010409 100%);
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --card-border: rgba(255, 255, 255, 0.1);
            --danger: #ff4d4d;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        [data-theme="light"] {
            --space-bg: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 40%, #A8E063 100%);
            --text: #1b4332;
            --accent: #2d6a4f;
            --glass: rgba(255, 255, 255, 0.85);
            --card-border: rgba(45, 106, 79, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--space-bg); background-attachment: fixed; color: var(--text); overflow-x: hidden; transition: 0.5s; min-height: 100vh; }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; z-index: -1;
        }

        .player-header {
            position: fixed; top: 0; width: 100%; height: 70px; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
        }

        .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
        .logo-img { height: 40px; width: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
        .logo-text { font-size: 1.3rem; font-weight: 800; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .theme-toggle {
            background: none; border: 1.5px solid var(--accent); color: var(--accent);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; 
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .theme-toggle:hover { background: var(--accent); color: white; box-shadow: 0 0 15px var(--accent-glow); }

        .player-layout { display: grid; grid-template-columns: 1fr 350px; gap: 25px; padding: 90px 20px 20px; max-width: 1400px; margin: 0 auto; }
        
        .video-main { width: 100%; }
        .video-box { 
            position: relative; padding-bottom: 56.25%; height: 0; 
            background: #000; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); border: 1px solid var(--card-border);
        }
        #mainIframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .sidebar-card { 
            background: var(--glass); border-radius: 20px; border: 1px solid var(--card-border); 
            padding: 20px; backdrop-filter: blur(10px);
        }
        
        .lecture-list-container { max-height: 400px; overflow-y: auto; margin-top: 15px; padding-right: 5px; }
        .lecture-list-container::-webkit-scrollbar { width: 5px; }
        .lecture-list-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .lecture-item { 
            padding: 14px; border-radius: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem; transition: 0.3s; display: flex; justify-content: space-between; margin-bottom: 8px;
            background: rgba(255,255,255,0.02); align-items: center;
        }
        .lecture-item:hover { background: var(--accent); color: white; transform: translateX(5px); }
        .active-lecture { background: var(--accent) !important; color: white !important; font-weight: 700; box-shadow: 0 5px 15px var(--accent-glow); }

        .complete-mark { color: #2ecc71; font-weight: bold; font-size: 1rem; margin-left: 8px; }

        .btn-res { 
            display: block; width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px; 
            text-align: center; font-weight: 800; cursor: pointer; border: none; font-size: 0.85rem; transition: 0.3s;
            text-decoration: none;
        }
        .btn-pdf { background: rgba(255, 77, 77, 0.15); color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.3); }
        .btn-mcq { background: rgba(40, 167, 69, 0.15); color: #2ecc71; border: 1px solid rgba(40, 167, 69, 0.3); }

        #doubtText {
            width: 100%; height: 80px; margin-top: 15px; border-radius: 12px; 
            border: 1px solid var(--card-border); padding: 12px; background: rgba(255,255,255,0.05);
            color: var(--text); resize: none;
        }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
            flex-direction: column; backdrop-filter: blur(10px);
        }
        .modal-content { width: 90%; height: 85%; background: var(--space-bg); border-radius: 20px; overflow-y: auto; position: relative; padding: 30px; border: 1px solid var(--accent); }
        
        .close-modal { 
            position: absolute; top: 20px; right: 30px; font-size: 35px; color: white; 
            cursor: pointer; z-index: 2002; background: var(--danger); 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; transition: 0.3s;
        }

        @media (max-width: 900px) { 
            .player-layout { grid-template-columns: 1fr; padding-top: 80px; } 
            .logo-text { display: none; }
        }
    </style>
</head>
<body>

<header class="player-header">
    <a href="/dashboard.html" class="brand">
        <img src="/images/OUR_LOGO.png" alt="PiMentor Logo" class="logo-img">
        <div class="logo-text">PiMentor</div>
    </a>
    <div style="display: flex; gap: 15px; align-items: center;">
        <button onclick="toggleTheme()" id="themeBtn" class="theme-toggle">🌙</button>
        <a href="#" id="backBtn" style="text-decoration: none; color: var(--accent); font-weight: 800; border: 1.5px solid var(--accent); padding: 6px 15px; border-radius: 20px; font-size: 0.85rem;">BACK</a>
    </div>
</header>

<div class="player-layout">
    <div class="video-main">
        <div class="video-box">
            <div id="mainIframe"></div>
        </div>
        <div style="background: var(--glass); padding: 25px; border-radius: 20px; margin-top: 20px; border: 1px solid var(--card-border); backdrop-filter: blur(10px);">
            <h1 id="lectureTitle" style="margin: 0 0 10px; font-size: 1.6rem;">Loading...</h1>
            <p id="topicDisplay" style="color: var(--accent); font-weight: 800; font-size: 0.9rem; letter-spacing: 0.5px;"></p>
            <p id="chapterNameDisplay" style="opacity: 0.6; font-size: 0.8rem; margin-top: 8px;"></p>
        </div>
    </div>
    
    <div class="sidebar">
        <div class="sidebar-card">
            <h3 style="font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent);">🏆 Progress Leaders</h3>
            <div id="leaderboardList" style="margin-top: 15px;">
                <p style="font-size: 0.8rem; opacity: 0.5; text-align: center;">Loading rankings...</p>
            </div>
        </div>

        <div class="sidebar-card">
            <h3 style="font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;">Resources</h3>
            <button id="pdfBtn" class="btn-res btn-pdf" style="display:none;" onclick="handlePdfOpen(this.dataset.url)">📄 Download PDF Notes</button>
            <button id="mcqBtn" class="btn-res btn-mcq" style="display:none;" onclick="openQuiz()">📝 Take Quiz</button>
        </div>

        <div class="sidebar-card">
            <h3 style="font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;">Curriculum</h3>
            <div id="lectureList" class="lecture-list-container"></div>
        </div>

        <div class="sidebar-card">
            <h3 style="font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;">Ask Doubts</h3>
            <textarea id="doubtText" placeholder="Ask your mentor about this lecture..."></textarea>
            <button onclick="submitDoubt()" style="width: 100%; margin-top: 12px; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; box-shadow: 0 5px 15px var(--accent-glow);">SEND DOUBT</button>
        </div>
    </div>
</div>

<div id="resourceModal" class="modal-overlay">
    <span class="close-modal" onclick="closeModal()" title="Back to Video">&times;</span>
    <div class="modal-content">
        <iframe id="resourceIframe" src="" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
</div>

<div id="quizModal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeQuizModal()" style="top:10px; right:10px; width:40px; height:40px; font-size:25px;">&times;</span>
        <div id="quizContainer">
            <h2 id="quizTitle" style="color: var(--accent); margin-bottom: 20px;">Knowledge Check</h2>
            <div id="questionArea"></div>
            <button id="submitQuizBtn" onclick="calculateScore()" class="btn-res btn-mcq" style="margin-top: 20px;">Submit Answers</button>
        </div>
        <div id="quizResult" style="display:none; text-align:center;">
            <h1 id="resultScore" style="font-size: 3rem; margin-bottom: 10px; color: var(--accent);">0/0</h1>
            <div id="quizReview" style="text-align: left; margin-top: 30px; border-top: 1px solid var(--card-border); padding-top: 20px; max-height: 400px; overflow-y: auto;"></div>
            <button onclick="closeQuizModal()" class="btn-res btn-pdf" style="margin-top: 20px;">Back to Lecture</button>
        </div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('courseId');
    const chapter = urlParams.get('chapter');
    const token = localStorage.getItem("token");
    const BASE_URL = "https://pimentor-project.onrender.com";
    // Inside playLecture function
const pBtn = document.getElementById("pdfBtn");
if(lec.pdfNotes) { 
    pBtn.style.display = "block"; 
    pBtn.dataset.url = lec.pdfNotes; // Store the URL here
} else { 
    pBtn.style.display = "none"; 
}
    let activeLectureId = null;
    let ytPlayer = null;
    let studentProgress = [];
    let currentQuizData = [];

    // FullscreenOrientation logic for App
    document.addEventListener('fullscreenchange', () => {
        if (typeof FullscreenChannel !== "undefined") {
            if (document.fullscreenElement) FullscreenChannel.postMessage('enter_fullscreen');
            else FullscreenChannel.postMessage('exit_fullscreen');
        }
    });

    // 🚀 NEW HIGH-OCTANE LATEX HEALER
    function prepareMath(str) {
        if (!str) return "";
        // 1. Fix backslash escaping and \text conversion
        let fixed = str
            .replace(/ext\{/g, '\\text{')
            .replace(/\\+/g, '\\')
            .replace(/\$/g, '');

        // 2. The Spacing Fix: Split by words. Wrap ONLY words with math symbols.
        // This keeps regular text spaces perfectly intact.
        return fixed.split(' ').map(word => {
            const hasMath = /[\\]|[_]|[\^]|[=]|[{]|[}]/.test(word);
            return hasMath ? `\\(${word}\\)` : word;
        }).join(' ');
    }

    async function initPlayer() {
        if (!courseId || !chapter) { window.location.href = "dashboard.html"; return; }
        document.getElementById("backBtn").href = `course-structure.html?id=${courseId}`;
        document.getElementById("chapterNameDisplay").innerText = "CHAPTER: " + decodeURIComponent(chapter);

        try {
            const [lecRes, progRes] = await Promise.all([
                fetch(`${BASE_URL}/api/purchase/course-content/${courseId}/${encodeURIComponent(chapter)}`, {
                    headers: { "Authorization": "Bearer " + token }
                }),
                fetch(`${BASE_URL}/api/progress/course-details/${courseId}`, {
                    headers: { "Authorization": "Bearer " + token }
                })
            ]);
            const lectures = await lecRes.json();
            studentProgress = await progRes.json();
            renderLectureList(lectures);
            if (lectures.length > 0) {
                const targetLecId = urlParams.get('lectureId');
                const lectureToPlay = (targetLecId && lectures.find(l => l._id === targetLecId)) || lectures[0];
                playLecture(lectureToPlay);
            }
            fetchLeaderboard();
        } catch (err) { console.error(err); }
    }

    function playLecture(lec) {
        activeLectureId = lec._id;
        document.querySelectorAll('.lecture-item').forEach(el => el.classList.remove('active-lecture'));
        const activeItem = document.getElementById(`lec-${lec._id}`);
        if(activeItem) activeItem.classList.add('active-lecture');

        document.getElementById("lectureTitle").innerText = lec.title;
        document.getElementById("topicDisplay").innerText = "TOPIC: " + (lec.topicName || "General");

        let vId = lec.videoUrl.split('v=')[1] || lec.videoUrl.split('/').pop();
        if(vId.includes('&')) vId = vId.split('&')[0];
        document.getElementById("mainIframe").innerHTML = `<iframe src="https://www.youtube.com/embed/${vId}?rel=0&modestbranding=1" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>`;

        document.getElementById("pdfBtn").style.display = lec.pdfNotes ? "block" : "none";
        document.getElementById("pdfBtn").dataset.url = lec.pdfNotes;
        document.getElementById("mcqBtn").style.display = "block";
    }

    async function openQuiz() {
        try {
            const res = await fetch(`${BASE_URL}/api/purchase/quiz/fetch/${activeLectureId}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const data = await res.json();
            if (!data?.questions?.length) return Swal.fire('Info', 'No quiz yet.', 'info');
            currentQuizData = data.questions;
            renderQuizQuestions(currentQuizData);
            document.getElementById("quizModal").style.display = "flex";
            document.getElementById("quizContainer").style.display = "block";
            document.getElementById("quizResult").style.display = "none";
        } catch (err) { Swal.fire('Error', 'Failed to load quiz.', 'error'); }
    }

    function renderQuizQuestions(questions) {
        const area = document.getElementById("questionArea");
        area.innerHTML = questions.map((q, i) => `
            <div style="margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px;">
                <p style="font-weight:bold; margin-bottom:15px; font-size: 1.1rem; line-height:1.6;">
                    ${i + 1}. ${prepareMath(q.questionText)}
                </p>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    ${q.options.map((opt, oi) => `
                        <label style="display:block; background:rgba(255,255,255,0.03); padding:12px; border-radius:10px; cursor:pointer; border: 1px solid rgba(255,255,255,0.05);">
                            <input type="radio" name="q${i}" value="${oi}" style="margin-right:10px;"> 
                            ${prepareMath(opt)}
                        </label>`).join('')}
                </div>
            </div>`).join('');

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise([area]).catch(e => console.log(e));
        }
    }
function handlePdfOpen(url) {
    if (!url) return;

    let finalUrl = url;

    // --- GOOGLE DRIVE DIRECT DOWNLOAD CONVERTER ---
    if (url.includes("drive.google.com")) {
        let fileId = "";

        // Case 1: Standard URL format (/file/d/FILE_ID/view)
        if (url.includes("/file/d/")) {
            fileId = url.split("/file/d/")[1].split("/")[0];
        } 
        // Case 2: Query parameter format (id=FILE_ID)
        else if (url.includes("id=")) {
            const matches = url.match(/id=([^&]+)/);
            if (matches) fileId = matches[1];
        }

        if (fileId) {
            // This endpoint bypasses the viewer and triggers a direct download
            finalUrl = `https://docs.google.com/uc?export=download&id=${fileId}`;
        }
    }

    // --- EXECUTE DOWNLOAD ---
    // Create a temporary hidden anchor to trigger download across all browsers/webviews
    const link = document.createElement('a');
    link.href = finalUrl;
    link.target = '_blank';
    link.download = ''; // Encourages download behavior
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
    async function calculateScore() {
        let score = 0;
        let reviewHtml = '<h3 style="color:var(--accent); margin-bottom:20px;">Quiz Review:</h3>';

        currentQuizData.forEach((q, i) => {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            const selIdx = sel ? parseInt(sel.value) : null;
            const isCorrect = selIdx === q.correctAnswerIndex;
            if (isCorrect) score++;

            reviewHtml += `
                <div style="margin-bottom: 15px; padding: 15px; background: rgba(255,255,255,0.02); border-radius: 12px; border-left: 4px solid ${isCorrect ? '#2ecc71' : '#ff4d4d'};">
                    <p style="font-weight:700; margin-bottom:5px; line-height:1.5;">${i+1}. ${prepareMath(q.questionText)}</p>
                    <p style="font-size:0.85rem; color:#2ecc71;">Correct: ${prepareMath(q.options[q.correctAnswerIndex])}</p>
                    ${!isCorrect ? `<p style="font-size:0.85rem; color:#ff4d4d;">Your Choice: ${selIdx !== null ? prepareMath(q.options[selIdx]) : 'Skipped'}</p>` : ''}
                </div>`;
        });

        document.getElementById("quizContainer").style.display = "none";
        document.getElementById("quizResult").style.display = "block";
        document.getElementById("resultScore").innerText = `${score} / ${currentQuizData.length}`;
        document.getElementById("quizReview").innerHTML = reviewHtml;

        MathJax.typesetPromise([document.getElementById("quizReview")]);

        fetch(`${BASE_URL}/api/progress/submit-quiz`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ courseId, lectureId: activeLectureId, score })
        }).then(() => fetchLeaderboard());
    }

    async function fetchLeaderboard() {
        try {
            const res = await fetch(`${BASE_URL}/api/purchase/leaderboard/${courseId}`, { headers: { "Authorization": "Bearer " + token } });
            const data = await res.json();
            const list = document.getElementById("leaderboardList");
            if (data.length > 0) {
                list.innerHTML = data.map((u, i) => `
                    <div style="display:flex; justify-content:space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
                        <span style="font-size:0.85rem;"><b style="color:var(--accent);">#${i+1}</b> ${u.name.split(' ')[0]}</span>
                        <span style="background:var(--accent); color:white; padding:2px 8px; border-radius:10px; font-size:0.7rem;">${u.score}%</span>
                    </div>`).join('');
            }
        } catch (err) {}
    }

    function renderLectureList(lectures) {
        document.getElementById("lectureList").innerHTML = lectures.map((l, i) => {
            const isDone = studentProgress.find(p => p.lectureId === l._id && p.isVideoCompleted);
            return `<div class="lecture-item" id="lec-${l._id}" onclick='playLecture(${JSON.stringify(l).replace(/'/g, "&apos;")})'>
                <span>${i + 1}. ${l.title}</span><span class="complete-mark">${isDone ? '✅' : ''}</span>
            </div>`;
        }).join('');
    }

    function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        const btn = document.getElementById("themeBtn");
        if(btn) btn.innerText = theme === "dark" ? "☀️" : "🌙";
        localStorage.setItem("pimentor-theme", theme);
    }
const savedTheme = localStorage.getItem('pimentor-theme') || 'light';
applyTheme(savedTheme);
    function toggleTheme() { 
        const current = document.documentElement.getAttribute("data-theme");
        applyTheme(current === "dark" ? "light" : "dark"); 
    }

    function closeQuizModal() { document.getElementById("quizModal").style.display = "none"; }
    function openResourceModal(url) { document.getElementById("resourceIframe").src = url; document.getElementById("resourceModal").style.display = "flex"; }
    function closeModal() { document.getElementById("resourceModal").style.display = "none"; }

    document.addEventListener("DOMContentLoaded", initPlayer);
</script>
</body>
</html>
