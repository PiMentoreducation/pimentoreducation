<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Learning Player | PiMentor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 1. THEME VARIABLES --- */
        :root {
            --space-bg: radial-gradient(circle at top, #0d1117 0%, #010409 100%);
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --card-border: rgba(255, 255, 255, 0.1);
            --danger: #ff4d4d;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        [data-theme="light"] {
            --space-bg: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 40%, #A8E063 100%);
            --text: #1b4332;
            --accent: #2d6a4f;
            --glass: rgba(255, 255, 255, 0.85);
            --card-border: rgba(45, 106, 79, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--space-bg); background-attachment: fixed; color: var(--text); overflow-x: hidden; transition: 0.5s; min-height: 100vh; }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; z-index: -1;
        }

        .player-header {
            position: fixed; top: 0; width: 100%; height: 70px; z-index: 1000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
        }

        .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
        .logo-img { height: 40px; width: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
        .logo-text { font-size: 1.3rem; font-weight: 800; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .theme-toggle {
            background: none; border: 1.5px solid var(--accent); color: var(--accent);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; 
            font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .theme-toggle:hover { background: var(--accent); color: white; box-shadow: 0 0 15px var(--accent-glow); }

        .player-layout { display: grid; grid-template-columns: 1fr 350px; gap: 25px; padding: 90px 20px 20px; max-width: 1400px; margin: 0 auto; }
        
        .video-main { width: 100%; }
        .video-box { 
            position: relative; padding-bottom: 56.25%; height: 0; 
            background: #000; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); border: 1px solid var(--card-border);
        }
        /* API will replace the div inside with an iframe */
        #mainIframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .sidebar-card { 
            background: var(--glass); border-radius: 20px; border: 1px solid var(--card-border); 
            padding: 20px; backdrop-filter: blur(10px);
        }
        
        .lecture-list-container { max-height: 400px; overflow-y: auto; margin-top: 15px; padding-right: 5px; }
        .lecture-list-container::-webkit-scrollbar { width: 5px; }
        .lecture-list-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .lecture-item { 
            padding: 14px; border-radius: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem; transition: 0.3s; display: flex; justify-content: space-between; margin-bottom: 8px;
            background: rgba(255,255,255,0.02);
        }
        .lecture-item:hover { background: var(--accent); color: white; transform: translateX(5px); }
        .active-lecture { background: var(--accent) !important; color: white !important; font-weight: 700; box-shadow: 0 5px 15px var(--accent-glow); }

        .btn-res { 
            display: block; width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px; 
            text-align: center; font-weight: 800; cursor: pointer; border: none; font-size: 0.85rem; transition: 0.3s;
            text-decoration: none;
        }
        .btn-pdf { background: rgba(255, 77, 77, 0.15); color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.3); }
        .btn-mcq { background: rgba(40, 167, 69, 0.15); color: #2ecc71; border: 1px solid rgba(40, 167, 69, 0.3); }
        .btn-res:hover { transform: translateY(-3px); filter: brightness(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        #doubtText {
            width: 100%; height: 80px; margin-top: 15px; border-radius: 12px; 
            border: 1px solid var(--card-border); padding: 12px; background: rgba(255,255,255,0.05);
            color: var(--text); resize: none;
        }
        [data-theme="light"] #doubtText { background: #fff; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
            flex-direction: column; backdrop-filter: blur(10px);
        }
        .modal-content { width: 90%; height: 85%; background: white; border-radius: 20px; overflow: hidden; position: relative; }
        
        .close-modal { 
            position: absolute; top: 20px; right: 30px; font-size: 35px; color: white; 
            cursor: pointer; z-index: 2002; background: var(--danger); 
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; transition: 0.3s; box-shadow: 0 0 20px rgba(255, 77, 77, 0.5);
        }
        .close-modal:hover { transform: scale(1.1) rotate(90deg); }

        @media (max-width: 900px) { 
            .player-layout { grid-template-columns: 1fr; padding-top: 80px; } 
            .logo-text { display: none; }
        }
    </style>
</head>
<body>

<header class="player-header">
    <a href="/dashboard.html" class="brand">
        <img src="/images/OUR_LOGO.png" alt="PiMentor Logo" class="logo-img">
        <div class="logo-text">PiMentor</div>
    </a>
    <div style="display: flex; gap: 15px; align-items: center;">
        <button onclick="toggleTheme()" id="themeBtn" class="theme-toggle">🌙</button>
        <a href="#" id="backBtn" style="text-decoration: none; color: var(--accent); font-weight: 800; border: 1.5px solid var(--accent); padding: 6px 15px; border-radius: 20px; font-size: 0.85rem;">BACK</a>
    </div>
</header>

<div class="player-layout">
    <div class="video-main">
        <div class="video-box">
            <div id="mainIframe"></div>
        </div>
        <div style="background: var(--glass); padding: 25px; border-radius: 20px; margin-top: 20px; border: 1px solid var(--card-border); backdrop-filter: blur(10px);">
            <h1 id="lectureTitle" style="margin: 0 0 10px; font-size: 1.6rem;">Loading...</h1>
            <p id="topicDisplay" style="color: var(--accent); font-weight: 800; font-size: 0.9rem; letter-spacing: 0.5px;"></p>
            <p id="chapterNameDisplay" style="opacity: 0.6; font-size: 0.8rem; margin-top: 8px;"></p>
        </div>
    </div>
    <div id="quizModal" class="modal-overlay">
    <div class="modal-content" style="background: var(--space-bg); padding: 30px; color: white; border: 1px solid var(--accent);">
        <div id="quizContainer">
            <h2 id="quizTitle" style="color: var(--accent); margin-bottom: 20px;">Knowledge Check</h2>
            <div id="questionArea">
                </div>
            <button id="submitQuizBtn" onclick="calculateScore()" class="btn-res btn-mcq" style="margin-top: 20px;">Submit Answers</button>
        </div>
        
        <div id="quizResult" style="display:none; text-align:center;">
            <h1 id="resultScore" style="font-size: 3rem; margin-bottom: 10px;">0/0</h1>
            <p id="resultFeedback" style="margin-bottom: 20px;"></p>
            <button onclick="closeQuizModal()" class="btn-res btn-pdf">Back to Lecture</button>
        </div>
    </div>
</div>
<div class="sidebar-card">
    <h3 style="font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent);">🏆 Progress Leaders</h3>
    <div id="leaderboardList" style="margin-top: 15px;">
        <p style="font-size: 0.8rem; opacity: 0.5; text-align: center;">Loading rankings...</p>
    </div>
</div>
    <div class="sidebar">
        <div class="sidebar-card">
            <h3 style="font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;">Resources</h3>
            <button id="pdfBtn" class="btn-res btn-pdf" style="display:none;" onclick="openResourceModal(this.dataset.url)">📄 View PDF Notes</button>
            <button id="mcqBtn" class="btn-res btn-mcq" style="display:none;" onclick="openResourceModal(this.dataset.url)">📝 Take Quiz</button>
        </div>

        <div class="sidebar-card">
            <h3 style="font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;">Curriculum</h3>
            <div id="lectureList" class="lecture-list-container"></div>
        </div>

        <div class="sidebar-card">
            <h3 style="font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;">Ask Doubts</h3>
            <textarea id="doubtText" placeholder="Ask your mentor about this lecture..."></textarea>
            <button onclick="submitDoubt()" style="width: 100%; margin-top: 12px; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 800; box-shadow: 0 5px 15px var(--accent-glow);">SEND DOUBT</button>
            <p id="doubtStatus" style="font-size: 0.75rem; margin-top: 8px; color: #2ecc71; text-align: center; font-weight: bold;"></p>
        </div>
    </div>
</div>

<div id="resourceModal" class="modal-overlay">
    <span class="close-modal" onclick="closeModal()" title="Back to Video">&times;</span>
    <div class="modal-content">
        <iframe id="resourceIframe" src="" style="width: 100%; height: 100%; border: none;"></iframe>
    </div>
    <p style="color: white; margin-top: 20px; font-size: 0.9rem; font-weight: bold;">Click the RED button to return to the lecture.</p>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('courseId');
    const chapter = urlParams.get('chapter');
    const token = localStorage.getItem("token");
    const BASE_URL = "https://pimentor-project.onrender.com";
    
    let activeLectureId = null;
    let ytPlayer = null;
    let watchTimer = null;
    let isVideoFlaggedComplete = false;

    // --- THEME LOGIC ---
    function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        const btn = document.getElementById("themeBtn");
        if(btn) btn.innerText = theme === "dark" ? "☀️" : "🌙";
        localStorage.setItem("pimentor-theme", theme);
    }
    applyTheme(localStorage.getItem("pimentor-theme") || "dark");
    function toggleTheme() { applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"); }

    // --- PLAYER INITIALIZATION ---
    async function initPlayer() {
        if (!courseId || !chapter) {
            window.location.href = "dashboard.html";
            return;
        }

        document.getElementById("backBtn").href = `course-structure.html?id=${courseId}`;
        document.getElementById("chapterNameDisplay").innerText = "CHAPTER: " + chapter;

        try {
            const res = await fetch(`${BASE_URL}/api/purchase/course-content/${courseId}/${encodeURIComponent(chapter)}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const lectures = await res.json();
            const list = document.getElementById("lectureList");

            if (lectures.length > 0) {
                list.innerHTML = lectures.map((l, index) => `
                    <div class="lecture-item" id="lec-${l._id}" onclick='playLecture(${JSON.stringify(l).replace(/'/g, "&apos;")})'>
                        <span>${index + 1}. ${l.title}</span>
                    </div>
                `).join('');
                playLecture(lectures[0]);
            } else {
                list.innerHTML = "<p style='text-align:center; opacity:0.5;'>No lectures found.</p>";
            }
            await fetchLeaderboard(); // 🔥 Add this line at the very end
        } catch (err) { console.error(err); }
    }

    // --- YOUTUBE API LOADED HANDLER ---
    function onYouTubeIframeAPIReady() {
        // This is a global function required by YT API
        console.log("YouTube API Ready");
    }

    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    // --- LECTURE SWITCHER & WATCHDOG ---
    function playLecture(lec) {
        activeLectureId = lec._id;
        isVideoFlaggedComplete = false; // Reset for new video
        if(watchTimer) clearInterval(watchTimer);

        document.querySelectorAll('.lecture-item').forEach(el => el.classList.remove('active-lecture'));
        const activeItem = document.getElementById(`lec-${lec._id}`);
        if(activeItem) activeItem.classList.add('active-lecture');

        document.getElementById("lectureTitle").innerText = lec.title;
        document.getElementById("topicDisplay").innerText = "TOPIC: " + (lec.topicName || "General");

        const videoId = extractVideoId(lec.videoUrl);

        if (!ytPlayer) {
            // Initial Creation
            ytPlayer = new YT.Player('mainIframe', {
                height: '100%',
                width: '100%',
                videoId: videoId,
                playerVars: { 'playsinline': 1, 'rel': 0, 'modestbranding': 1 },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        } else {
            // Reuse existing player
            ytPlayer.loadVideoById(videoId);
        }

        // PDF & MCQ Links
        const pBtn = document.getElementById("pdfBtn");
        const mBtn = document.getElementById("mcqBtn");
        if(lec.pdfNotes) { pBtn.style.display = "block"; pBtn.dataset.url = lec.pdfNotes; } 
        else { pBtn.style.display = "none"; }
        if(lec.practiceMcq) { mBtn.style.display = "block"; mBtn.dataset.url = lec.practiceMcq; } 
        else { mBtn.style.display = "none"; }
    }

    function onPlayerReady(event) {
        startWatchdog();
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            startWatchdog();
        }
    }

    function startWatchdog() {
        if (watchTimer) clearInterval(watchTimer);
        
        watchTimer = setInterval(async () => {
            if (ytPlayer && ytPlayer.getCurrentTime && !isVideoFlaggedComplete) {
                const currentTime = ytPlayer.getCurrentTime();
                const duration = ytPlayer.getDuration();
                
                if (duration > 0) {
                    const ratio = currentTime / duration;
                    if (ratio >= 0.85) {
                        isVideoFlaggedComplete = true;
                        console.log("85% Milestone Reached!");
                        clearInterval(watchTimer);
                        await syncProgress();
                    }
                }
            }
        }, 5000); // Pulse every 5 seconds
    }

    async function syncProgress() {
        try {
            const res = await fetch(`${BASE_URL}/api/progress/update-progress`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ 
                    courseId: courseId, 
                    lectureId: activeLectureId, 
                    isVideoCompleted: true 
                })
            });
            const data = await res.json();
            if (data.isMastered) {
                console.log("Lecture Mastered! 🏆");
            }
        } catch (err) { console.error("Progress sync error:", err); }
    }

    // --- MODAL & DOUBT LOGIC ---
    function openResourceModal(url) {
        document.getElementById("resourceIframe").src = url;
        document.getElementById("resourceModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("resourceModal").style.display = "none";
        document.getElementById("resourceIframe").src = "";
    }

    async function submitDoubt() {
        const question = document.getElementById("doubtText").value;
        const status = document.getElementById("doubtStatus");
        if(!question.trim()) return alert("Please type your question.");

        try {
            const res = await fetch(`${BASE_URL}/api/purchase/ask-doubt`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ lectureId: activeLectureId, question: question })
            });

            if(res.ok) {
                document.getElementById("doubtText").value = "";
                status.innerText = "Doubt transmitted successfully! 🚀";
                setTimeout(() => status.innerText = "", 3000);
            }
        } catch (err) { console.error(err); }
    }

    document.addEventListener("DOMContentLoaded", initPlayer);

    // --- FULLSCREEN HANDLERS ---
    function handleFullscreenChange() {
        const isFullscreen = document.fullscreenElement || 
                             document.webkitFullscreenElement || 
                             document.mozFullScreenElement ||
                             document.msFullscreenElement;

        if (isFullscreen) {
            if (typeof FullscreenChannel !== 'undefined') FullscreenChannel.postMessage('enter_fullscreen');
        } else {
            if (typeof FullscreenChannel !== 'undefined') FullscreenChannel.postMessage('exit_fullscreen');
        }
    }

    document.addEventListener('fullscreenchange', handleFullscreenChange);
    document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
    document.addEventListener('mozfullscreenchange', handleFullscreenChange);
    document.addEventListener('MSFullscreenChange', handleFullscreenChange);
    let currentQuizData = [];

async function openQuiz() {
    try {
        const res = await fetch(`${BASE_URL}/api/quiz/fetch/${activeLectureId}`, {
            headers: { "Authorization": "Bearer " + token }
        });
        const data = await res.json();
        
        if (!data || data.questions.length === 0) {
            return alert("No quiz available for this lecture yet.");
        }

        currentQuizData = data.questions;
        renderQuizQuestions(data.questions);
        document.getElementById("quizModal").style.display = "flex";
        document.getElementById("quizContainer").style.display = "block";
        document.getElementById("quizResult").style.display = "none";
    } catch (err) {
        alert("Error loading quiz.");
    }
}

function renderQuizQuestions(questions) {
    const area = document.getElementById("questionArea");
    area.innerHTML = questions.map((q, qIndex) => `
        <div class="quiz-q-box" style="margin-bottom: 25px;">
            <p style="font-weight:bold; margin-bottom:10px;">${qIndex + 1}. ${q.questionText}</p>
            ${q.options.map((opt, oIndex) => `
                <label style="display:block; margin-bottom:8px; cursor:pointer;">
                    <input type="radio" name="q${qIndex}" value="${oIndex}"> ${opt}
                </label>
            `).join('')}
        </div>
    `).join('');
}

async function calculateScore() {
    let score = 0;
    currentQuizData.forEach((q, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        if (selected && parseInt(selected.value) === q.correctAnswerIndex) {
            score++;
        }
    });

    // 1. Show results locally
    document.getElementById("quizContainer").style.display = "none";
    document.getElementById("quizResult").style.display = "block";
    document.getElementById("resultScore").innerText = `${score} / ${currentQuizData.length}`;
    
    // 2. Sync with Backend
    await fetch(`${BASE_URL}/api/progress/submit-quiz`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ 
            courseId: courseId, 
            lectureId: activeLectureId, 
            score: score 
        })
    });
}

function closeQuizModal() {
    document.getElementById("quizModal").style.display = "none";
}
async function fetchLeaderboard() {
    try {
        const res = await fetch(`${BASE_URL}/api/purchase/leaderboard/${courseId}`, {
            headers: { "Authorization": "Bearer " + token }
        });
        const data = await res.json();
        const list = document.getElementById("leaderboardList");

        if (data.length > 0) {
            list.innerHTML = data.map((user, index) => `
                <div style="display:flex; justify-content:space-between; align-items:center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
                    <span style="font-size: 0.85rem;">
                        <b style="color:var(--accent)">#${index + 1}</b> ${user.name.split(' ')[0]}
                    </span>
                    <span class="stat-badge" style="background:var(--accent); color:white; padding:2px 8px; border-radius:10px; font-size:0.7rem;">
                        ${user.masteredCount} Mastered
                    </span>
                </div>
            `).join('');
        } else {
            list.innerHTML = "<p style='font-size:0.8rem; opacity:0.5;'>Be the first to master a lecture!</p>";
        }
    } catch (err) { console.error("Leaderboard fetch failed", err); }
}

// Call this inside your DOMContentLoaded or initPlayer
</script>
</body>
</html>
