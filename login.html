<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | PiMentor</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        /* 1. THEME VARIABLES (Retained & Enhanced) */
        :root {
            --primary: #7c4dff; /* Galactic Purple */
            --bg: radial-gradient(circle at top, #0d1117 0%, #010409 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --shadow: rgba(0,0,0,0.4);
            --glass: rgba(13, 17, 23, 0.8);
            --accent-glow: rgba(124, 77, 255, 0.4);
        }

        [data-theme="light"] {
            --bg: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 40%, #A8E063 100%);
            --card-bg: rgba(255, 255, 255, 0.85); 
            --text: #1b4332;
            --input-bg: #ffffff;
            --border: rgba(45, 106, 79, 0.2);
            --shadow: rgba(0,0,0,0.1);
            --primary: #2d6a4f;
            --glass: rgba(255, 255, 255, 0.85);
        }

        * { box-sizing: border-box; transition: background 0.3s ease, color 0.3s ease; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; 
            background: var(--bg); color: var(--text); 
            display: flex; flex-direction: column; min-height: 100vh;
            background-attachment: fixed;
        }

        /* --- STARDUST BACKGROUND --- */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; z-index: -1;
        }

        /* --- NEW GALACTIC NAVBAR --- */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 80px; z-index: 1000;
            display: flex; align-items: center; padding: 0 5%;
            background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }
        .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; margin-right: auto; text-decoration: none; }
        .logo-img { height: 45px; width: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); filter: drop-shadow(0 0 8px var(--primary)); }
        .logo-text { font-size: 1.5rem; font-weight: 800; background: linear-gradient(90deg, var(--text), var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { text-decoration: none; color: inherit; font-weight: 600; opacity: 0.8; }

        /* --- HAMBURGER & SIDEBAR --- */
        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; margin-right: 20px; }
        .hamburger span { width: 28px; height: 3px; background: var(--text); border-radius: 2px; }
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: var(--glass); backdrop-filter: blur(25px);
            z-index: 2000; transition: 0.4s ease; padding: 40px 30px; border-right: 1px solid var(--primary);
        }
        .sidebar.open { left: 0; }
        .sidebar-links { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        .sidebar-links a { color: var(--text); text-decoration: none; font-size: 1.1rem; font-weight: 700; }
        .theme-switch-wrapper { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--border); }

        /* 3. LOGIN CONTAINER (Retained) */
        .login-container {
            flex: 1; display: flex; align-items: center; justify-content: center; padding: 100px 20px 20px 20px;
        }
        .login-box {
            display: flex; width: 100%; max-width: 900px; 
            background: var(--card-bg); border-radius: 25px; 
            overflow: hidden; box-shadow: 0 10px 30px var(--shadow);
            border: 1px solid var(--border); backdrop-filter: blur(10px);
        }

        .login-left {
            flex: 1; background: var(--primary); color: white;
            padding: 50px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .login-left img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid rgba(255,255,255,0.3); margin-bottom: 20px; }
        .login-left h1 { margin: 0; font-size: 2.2rem; }

        .login-right {
            flex: 1.2; padding: 50px; display: flex; flex-direction: column; justify-content: center;
        }
        .login-right h2 { margin-top: 0; color: var(--primary); font-size: 1.8rem; }

        /* 4. FORM STYLING (Retained) */
        form { display: flex; flex-direction: column; gap: 15px; }
        label { font-weight: 600; font-size: 0.9rem; }
        input {
            padding: 12px; border-radius: 10px; border: 1px solid var(--border);
            background: var(--input-bg); color: var(--text); font-size: 1rem;
        }
        input:focus { outline: 2px solid var(--primary); }

        button[type="submit"] {
            padding: 14px; background: var(--primary); color: white;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
            font-size: 1.1rem; margin-top: 10px; box-shadow: 0 4px 15px var(--accent-glow);
        }

        .form-links { display: flex; justify-content: space-between; margin-top: 20px; font-size: 0.85rem; }
        .form-links a { color: var(--primary); text-decoration: none; font-weight: bold; }

        /* 5. FOOTER BUTTON (Retained) */
        .home-footer { padding: 30px; display: flex; justify-content: center; }
        .btn-home {
            text-decoration: none; color: var(--text); font-weight: bold;
            padding: 10px 30px; border: 2px solid var(--border); border-radius: 25px;
            display: flex; align-items: center; gap: 8px;
        }

        @media (max-width: 900px) {
            .nav-links { display: none; }
            .hamburger { display: flex; order: -1; margin-right: auto; }
            .brand { margin-right: 0; margin-left: auto; }
            .login-box { flex-direction: column; }
            .login-left { padding: 30px; }
            .login-right { padding: 30px; }
        }

        /* Toggle Switch Style */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-round { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider-round:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider-round { background-color: var(--primary); }
        input:checked + .slider-round:before { transform: translateX(24px); }
    </style>
</head>
<body>

<header class="navbar">
    <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </div>
    <a href="/index.html" class="brand">
        <img src="/images/OUR_LOGO.png" class="logo-img" alt="pimentor">
        <div class="logo-text">PiMentor</div>
    </a>
    <nav class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/courses.html">Courses</a>
        <a href="/register.html">Register</a>
        <a href="community.html">Community</a>
        <a href="support.html">Support</a>
    </nav>
</header>

<aside class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div class="logo-text" style="-webkit-text-fill-color: var(--text);">Menu</div>
        <button id="closeSidebar" style="background:none; border:none; color:var(--text); font-size:2.5rem; cursor:pointer;">&times;</button>
    </div>
    <div class="theme-switch-wrapper">
        <span style="font-weight:700;">Dark Theme</span>
        <label class="switch">
            <input type="checkbox" id="themeToggle" checked>
            <span class="slider-round"></span>
        </label>
    </div>
    <nav class="sidebar-links">
        <a href="/index.html">Home</a>
        <a href="/courses.html">Courses</a>
        <a href="/register.html">Register</a>
        <a href="community.html">Community</a>
        <a href="support.html">Support</a>
    </nav>
</aside>

<div class="login-container">
    <div class="login-box">
        <div class="login-left">
            <img src="/images/OUR_LOGO.png" alt="PiMentor">
            <h1>PiMentor</h1>
            <p>Your journey to the top starts here.</p>
        </div>

        <div class="login-right">
            <h2>Student Login</h2>
            <form id="loginForm">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>

                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>

                <button type="submit">Login to Dashboard</button>

                <div class="form-links">
                    <a href="/forgot-password.html">Forgot Password?</a>
                    <a href="/register.html">New student? Register</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="home-footer">
    <a href="/index.html" class="btn-home">🏠 Back to Home</a>
</div>

<script>
    /* --- SIDEBAR & THEME LOGIC --- */
    const hamburger = document.getElementById('hamburger');
    const sidebar = document.getElementById('sidebar');
    const closeSidebar = document.getElementById('closeSidebar');
    const themeToggle = document.getElementById('themeToggle');
    
    hamburger.onclick = () => sidebar.classList.add('open');
    closeSidebar.onclick = () => sidebar.classList.remove('open');

    const setTheme = (theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('pimentor-theme', theme);
        themeToggle.checked = theme === 'dark';
    };

    const savedTheme = localStorage.getItem('pimentor-theme') || 'light';
    setTheme(savedTheme);

    themeToggle.addEventListener('change', () => {
        setTheme(themeToggle.checked ? 'dark' : 'light');
    });

    /* --- LOGIN LOGIC (Retained Exactly) --- */
    document.getElementById("loginForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
            const res = await fetch("https://pimentor-project.onrender.com/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (res.ok) {
                localStorage.setItem("token", data.token);
                localStorage.setItem("user", JSON.stringify(data.user));
                if (data.user && String(data.user.role).toLowerCase().trim() === "admin") {
                    window.location.href = "/admin.html";
                } else {
                    window.location.href = "/dashboard.html";
                }
            } else {
                alert(data.message || "Invalid credentials.");
            }
        } catch (err) {
            alert("Connection error. Is the server running?");
        }
    });
</script>
</body>
</html>
