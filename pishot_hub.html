<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi-Shot Hub | Discover Knowledge</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-bg: radial-gradient(circle at top, #0d1117 0%, #010409 100%);
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --card-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        [data-theme="light"] {
            --space-bg: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 40%, #A8E063 100%);
            --text: #1b4332;
            --accent: #2d6a4f;
            --glass: rgba(255, 255, 255, 0.85);
            --card-border: rgba(45, 106, 79, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.5s ease, color 0.5s ease; }
        body { background: var(--space-bg); color: var(--text); overflow-x: hidden; min-height: 100vh; background-attachment: fixed; }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; z-index: -1;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 80px; z-index: 1000;
            display: flex; align-items: center; padding: 0 5%;
            background: var(--glass); backdrop-filter: blur(15px); border-bottom: 1px solid var(--card-border);
        }

        .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; text-decoration: none; }
        .logo-img { height: 45px; width: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
        .logo-text { font-size: 1.5rem; font-weight: 800; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .nav-links { display: flex; gap: 25px; align-items: center; margin-left: auto; }
        .nav-links a { text-decoration: none; color: inherit; font-weight: 600; opacity: 0.8; font-size: 0.9rem; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }

        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; }
        .hamburger span { width: 28px; height: 3px; background: var(--text); border-radius: 2px; }

        /* --- SIDEBAR DRAWER --- */
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: var(--glass); backdrop-filter: blur(25px);
            z-index: 2000; transition: 0.4s ease; padding: 40px 30px; border-right: 1px solid var(--accent);
        }
        .sidebar.open { left: 0; }
        .sidebar-links { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        .sidebar-links a { color: var(--text); text-decoration: none; font-size: 1.1rem; font-weight: 700; opacity: 0.8; }
        
        .drawer-footer { position: absolute; bottom: 30px; width: calc(100% - 60px); border-top: 1px solid var(--card-border); pt: 20px; }
        
        /* Theme Toggle in Drawer */
        .theme-control { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 12px; }

        /* --- HUB CONTENT --- */
        .hub-header { text-align: center; margin-top: 140px; padding: 0 20px; }
        .hub-header h1 { font-size: 3rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -1px; }
        .hub-header p { opacity: 0.6; font-size: 1.1rem; }

        /* --- SEARCH & DROPDOWN SECTION --- */
        .search-container {
            max-width: 800px;
            margin: 40px auto 0;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .search-wrapper {
            position: relative;
            flex: 1;
        }

        #shortsSearch, #shortsDropdown {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid var(--card-border);
            background: var(--glass);
            color: var(--text);
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: var(--transition);
        }

        #shortsDropdown {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 15px;
        }

        [data-theme="light"] #shortsDropdown {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%231b4332' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpolyline points='6 9 12 15 18 9'%3E%3C/polyline%3E%3C/svg%3E");
        }

        #shortsSearch:focus, #shortsDropdown:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .category-grid {
            max-width: 1200px; margin: 60px auto; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;
        }

        .category-card {
            background: var(--glass); border: 1px solid var(--card-border); border-radius: 24px;
            padding: 40px 30px; text-align: center; cursor: pointer; transition: var(--transition);
            backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center;
            position: relative; overflow: hidden;
        }

        .category-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, var(--accent-glow)); opacity: 0; transition: 0.4s;
        }

        .category-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .category-card:hover::before { opacity: 1; }

        .cat-icon { font-size: 3.5rem; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--accent-glow)); }
        .cat-title { font-size: 1.4rem; font-weight: 800; color: var(--text); position: relative; z-index: 1; }
        .cat-count { font-size: 0.8rem; font-weight: 700; color: var(--accent); margin-top: 8px; text-transform: uppercase; z-index: 1; }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            .nav-links { display: none; }
            .hamburger { display: flex; margin-right: auto; }
            .brand { margin-left: auto; }
            .hub-header h1 { font-size: 2.2rem; }
            .search-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="hamburger" id="openDrawer"><span></span><span></span><span></span></div>
    <a href="index.html" class="brand">
        <img src="/images/OUR_LOGO.jpeg" class="logo-img" alt="PiMentor">
        <div class="logo-text">PiMentor</div>
    </a>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="courses.html">Courses</a>
        <a href="community.html">Community</a>
    </nav>
</header>

<aside class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="logo-text" style="background:none; -webkit-text-fill-color: var(--text);">PiShot Menu</div>
        <button id="closeDrawer" style="background:none; border:none; color:inherit; font-size:2.5rem; cursor:pointer;">&times;</button>
    </div>
    
    <nav class="sidebar-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="courses.html">All Courses</a>
        <a href="community.html">Community</a>
        <a href="about.html">About Us</a>
        <a href="terms.html">Terms & Conditions</a>
    </nav>

    <div class="drawer-footer">
        <div class="theme-control">
            <span style="font-weight:700; font-size:0.8rem;">DARK MODE</span>
            <button id="themeToggle" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">🌙</button>
        </div>
    </div>
</aside>

<main class="hub-header">
    <h1>Pi-Shot Universe</h1>
    <p>Select a dimension to start your spontaneous learning journey</p>
</main>

<section class="search-container">
    <div class="search-wrapper">
        <input type="text" id="shortsSearch" placeholder="Type to filter categories..." onkeyup="filterCategories()">
    </div>
    <div class="search-wrapper">
        <select id="shortsDropdown" onchange="if(this.value) window.location.href=this.value">
            <option value="">Quick Jump to a Dimension...</option>
        </select>
    </div>
</section>

<div class="category-grid" id="categoryGrid">
    <p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">Aligning the stars...</p>
</div>

<script>
    const BASE_URL = "https://pimentor-project.onrender.com";
    
    /* --- THEME LOGIC --- */
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        const btn = document.getElementById('themeToggle');
        btn.innerText = (theme === 'dark') ? '☀️' : '🌙';
        localStorage.setItem('pimentor-theme', theme);
    }

    document.getElementById('themeToggle').onclick = () => {
        const current = document.documentElement.getAttribute('data-theme');
        applyTheme(current === 'dark' ? 'light' : 'dark');
    };

    /* --- DRAWER LOGIC --- */
    const sidebar = document.getElementById('sidebar');
    document.getElementById('openDrawer').onclick = () => sidebar.classList.add('open');
    document.getElementById('closeDrawer').onclick = () => sidebar.classList.remove('open');

    /* --- SEARCH LOGIC --- */
    function filterCategories() {
        const input = document.getElementById('shortsSearch').value.toLowerCase();
        const cards = document.getElementsByClassName('category-card');
        
        for (let i = 0; i < cards.length; i++) {
            const title = cards[i].querySelector('.cat-title').innerText.toLowerCase();
            cards[i].style.display = title.includes(input) ? "" : "none";
        }
    }

    /* --- JUMP LOGIC (NEW) --- */
    function jumpToShort(category, order) {
        if (!order) return;
        window.location.href = `pishot_player.html?cat=${encodeURIComponent(category)}&startOrder=${order}`;
    }

    /* --- DATA FETCHING --- */
    async function loadCategories() {
        const grid = document.getElementById('categoryGrid');
        const dropdown = document.getElementById('shortsDropdown');
        
        try {
            const response = await fetch(`${BASE_URL}/api/shorts/categories`);
            const categories = await response.json();

            if (categories.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">No dimensions discovered yet. Check back soon!</p>`;
                return;
            }

            grid.innerHTML = "";

            for (const cat of categories) {
                // Fetch internal shorts list to build the episode jumper
                const shortsRes = await fetch(`${BASE_URL}/api/shorts/list?category=${encodeURIComponent(cat.name)}`);
                const shorts = await shortsRes.json();
                const sortedShorts = shorts.sort((a, b) => (a.order || 0) - (b.order || 0));

                const card = document.createElement('div');
                card.className = 'category-card';
                card.innerHTML = `
                    <div class="cat-icon" onclick="window.location.href='pishot_player.html?cat=${encodeURIComponent(cat.name)}'">${cat.icon || '🚀'}</div>
                    <div class="cat-title" onclick="window.location.href='pishot_player.html?cat=${encodeURIComponent(cat.name)}'">${cat.name}</div>
                    <div class="cat-count">${cat.videoCount} Pi-Shots Available</div>
                    
                    <div style="width: 100%; margin-top: 20px; position: relative; z-index: 10;">
                        <span style="font-size: 0.7rem; font-weight: 800; opacity: 0.6; display: block; margin-bottom: 5px;">RESUME FROM:</span>
                        <select onchange="jumpToShort('${cat.name}', this.value)" 
                                style="width: 100%; padding: 10px; border-radius: 12px; background: rgba(255,255,255,0.1); color: var(--text); border: 1px solid var(--card-border); font-size: 0.85rem; outline: none; cursor: pointer;">
                            <option value="">-- Episode Number --</option>
                            ${sortedShorts.map(s => `<option value="${s.order}">#${s.order}: ${s.title}</option>`).join('')}
                        </select>
                    </div>
                `;
                grid.appendChild(card);

                // Populate Dropdown
                const opt = document.createElement('option');
                opt.value = `pishot_player.html?cat=${encodeURIComponent(cat.name)}`;
                opt.textContent = `${cat.icon || '🚀'} ${cat.name}`;
                dropdown.appendChild(opt);
            }

        } catch (error) {
            console.error("Hub Error:", error);
            renderFallback();
        }
    }

    function renderFallback() {
        const fallback = [
            { name: "Class 10", icon: "📚", count: "45+" },
            { name: "Higher Math", icon: "📐", count: "30+" },
            { name: "Vedas", icon: "🕉️", count: "12+" },
            { name: "Sanskrit", icon: "📜", count: "20+" },
            { name: "SSC Prep", icon: "🏛️", count: "50+" }
        ];
        
        const grid = document.getElementById('categoryGrid');
        const dropdown = document.getElementById('shortsDropdown');

        grid.innerHTML = fallback.map(cat => `
            <div class="category-card" onclick="window.location.href='pishot_player.html?cat=${encodeURIComponent(cat.name)}'">
                <div class="cat-icon">${cat.icon}</div>
                <div class="cat-title">${cat.name}</div>
                <div class="cat-count">${cat.count} Pi-Shots Available</div>
            </div>
        `).join('');

        fallback.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = `pishot_player.html?cat=${encodeURIComponent(cat.name)}`;
            opt.textContent = `${cat.icon} ${cat.name}`;
            dropdown.appendChild(opt);
        });
    }

    document.addEventListener("DOMContentLoaded", () => {
        applyTheme(localStorage.getItem('pimentor-theme') || 'dark');
        loadCategories();
    });
</script>
</body>
</html>
