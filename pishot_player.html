<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pi-Shot Player | PiMentor</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-bg: #000000;
            --accent: #7c4dff;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --card-border: rgba(255, 255, 255, 0.1);
        }

        [data-theme="light"] {
            --space-bg: #f0f2f5;
            --text: #1b4332;
            --accent: #2d6a4f;
            --glass: rgba(255, 255, 255, 0.9);
            --card-border: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--space-bg); 
            color: var(--text); 
            overflow: hidden; 
            height: 100vh;
            width: 100vw;
        }

        /* --- MASTER SENSOR SPLASH --- */
        #unmute-splash {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 9999; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
            cursor: pointer;
        }

        .splash-content {
            text-align: center;
            animation: splashPulse 1.5s infinite;
            pointer-events: none; 
        }

        @keyframes splashPulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* --- NAVBAR & MOBILE OPTIMIZATION --- */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 70px; z-index: 1000;
            display: flex; align-items: center; padding: 0 5%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border);
            transition: transform 0.3s ease;
        }
        .navbar.hidden { transform: translateY(-100%); }

        .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .logo-img { height: 35px; width: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .logo-text { font-size: 1.2rem; font-weight: 800; color: #fff; }

        .nav-links { display: flex; gap: 20px; align-items: center; margin-left: auto; }
        .nav-links a { text-decoration: none; color: #fff; font-weight: 600; font-size: 0.8rem; opacity: 0.8; }

        .hamburger { cursor: pointer; display: flex; flex-direction: column; gap: 5px; margin-right: 15px; }
        .hamburger span { width: 25px; height: 2px; background: #fff; border-radius: 2px; }

        /* Mobile Specific Layout */
        @media (max-width: 768px) {
            .nav-links a { display: none; } /* Hide Home/Dashboard links */
            .navbar { justify-content: space-between; }
            .hamburger { order: 1; margin-right: 0; }
            .brand { order: 2; margin-left: 10px; }
            #themeToggle { order: 3; margin-left: auto; }
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: var(--glass); backdrop-filter: blur(25px);
            z-index: 2000; transition: 0.4s ease; padding: 40px 30px; border-right: 1px solid var(--accent);
        }
        .sidebar.open { left: 0; }
        .sidebar-links { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        .sidebar-links a { color: var(--text); text-decoration: none; font-size: 1.1rem; font-weight: 700; }
        
        /* --- PLAYER ENGINE --- */
        #pishot-scroller {
            height: 100vh; width: 100vw;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            scroll-behavior: smooth; -webkit-overflow-scrolling: touch;
        }

        .video-card {
            height: 100vh; width: 100vw;
            scroll-snap-align: start; position: relative;
            background: #000; display: flex; align-items: center; justify-content: center;
        }

        /* YouTube Button Shield Overlay */
        .interaction-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; background: transparent;
            display: block; 
            /* Linear gradient ensures we block the top/bottom 15% where YT buttons live */
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0.01) 0%, 
                rgba(0,0,0,0) 15%, 
                rgba(0,0,0,0) 85%, 
                rgba(0,0,0,0.01) 100%);
        }

        iframe { height: 100%; width: 100%; pointer-events: none; } 

        .video-info {
            position: absolute; bottom: 40px; left: 20px;
            z-index: 20; max-width: 80%; pointer-events: none;
        }
        .video-info h3 { font-size: 1.1rem; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .video-info p { font-size: 0.8rem; color: var(--accent); font-weight: 800; }

        @media (min-width: 900px) {
            iframe { width: 450px; height: 800px; border-radius: 20px; border: 5px solid var(--card-border); }
        }
    </style>
</head>
<body onclick="handleMasterTap()"> 

<div id="unmute-splash">
    <div class="splash-content">
        <div style="font-size: 3.5rem; margin-bottom: 15px;">🔊</div>
        <h2 style="color:white; font-size: 1.8rem; font-weight: 800;">TAP ANYWHERE</h2>
        <p style="color:var(--accent); font-weight: 700; letter-spacing: 1.5px;">To Unmute & Enjoy</p>
    </div>
</div>

<header class="navbar" id="mainNav">
    <div class="hamburger" id="openDrawer"><span></span><span></span><span></span></div>
    <a href="index.html" class="brand">
        <img src="/images/OUR_LOGO.png" class="logo-img" alt="PiMentor">
        <div class="logo-text">PiMentor</div>
    </a>
    <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <button id="themeToggle" style="background:none; border:none; font-size:1.2rem; cursor:pointer;">🌙</button>
    </nav>
</header>

<aside class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div class="logo-text" style="color:var(--text)">Pi-Shot Menu</div>
        <button id="closeDrawer" style="background:none; border:none; color:inherit; font-size:2.5rem; cursor:pointer;">&times;</button>
    </div>
    <nav class="sidebar-links">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="courses.html">All Courses</a>
        <a href="community.html">Community</a>
        <a href="about.html">About Us</a>
        <a href="terms.html">Terms & Conditions</a>
    </nav>
</aside>

<div id="pishot-scroller"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const BASE_URL = "https://pimentor-project.onrender.com";
    const scroller = document.getElementById('pishot-scroller');
    let players = [];
    let isUserInteracted = false;

    const urlParams = new URLSearchParams(window.location.search);
    const category = urlParams.get('cat') || 'All';

    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        const btn = document.getElementById('themeToggle');
        if(btn) btn.innerText = (theme === 'dark') ? '☀️' : '🌙';
        localStorage.setItem('pimentor-theme', theme);
    }

    document.getElementById('themeToggle').onclick = (e) => {
        e.stopPropagation();
        const current = document.documentElement.getAttribute('data-theme');
        applyTheme(current === 'dark' ? 'light' : 'dark');
    };

    const sidebar = document.getElementById('sidebar');
    document.getElementById('openDrawer').onclick = (e) => { e.stopPropagation(); sidebar.classList.add('open'); }
    document.getElementById('closeDrawer').onclick = (e) => { e.stopPropagation(); sidebar.classList.remove('open'); }

    async function fetchShorts() {
        try {
            const res = await fetch(`${BASE_URL}/api/shorts/list?category=${encodeURIComponent(category)}`);
            const shorts = await res.json();
            renderShorts(shorts);
        } catch (e) {
            renderShorts([{ytUrl: "https://youtube.com/shorts/50OQ-rJ4Hxw", title: "Welcome to Pi-Shots", category: "Explore"}]);
        }
    }

    function renderShorts(shorts) {
        scroller.innerHTML = shorts.map((s, index) => {
            return `
                <div class="video-card" id="card-${index}">
                    <div class="interaction-overlay"></div>
                    <div id="player-${index}"></div>
                    <div class="video-info">
                        <p>#${s.category}</p>
                        <h3>${s.title}</h3>
                    </div>
                </div>
            `;
        }).join('');
        initYTPlayers(shorts);
    }

    function initYTPlayers(shorts) {
        window.onYouTubeIframeAPIReady = () => {
            shorts.forEach((s, index) => {
                const vidId = s.ytUrl.split('/').pop().split('?')[0];
                players[index] = new YT.Player(`player-${index}`, {
                    videoId: vidId,
                    playerVars: { 
                        'autoplay': 1, 
                        'mute': 1, 
                        'controls': 0, 
                        'rel': 0, 
                        'loop': 1, 
                        'playlist': vidId,
                        'playsinline': 1,
                        'enablejsapi': 1
                    },
                    events: {
                        'onReady': (e) => {
                            e.target.mute();
                            e.target.playVideo();
                            if(index === 0) setupIntersectionObserver();
                        },
                        'onStateChange': (e) => {
                            if (e.data === 2 && isUserInteracted) {
                                e.target.playVideo();
                            }
                        }
                    }
                });
            });
        };
        if (typeof YT !== 'undefined' && YT.loaded) window.onYouTubeIframeAPIReady();
    }

    function setupIntersectionObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const index = entry.target.id.split('-')[1];
                if (entry.isIntersecting) {
                    if(players[index] && players[index].playVideo) {
                        if(isUserInteracted) {
                            players[index].unMute();
                            players[index].setVolume(100);
                        } else {
                            players[index].mute();
                        }
                        players[index].playVideo();
                    }
                    // Hide Navbar immediately when swiping to new video
                    document.getElementById('mainNav').classList.add('hidden');
                } else { 
                    if(players[index] && players[index].pauseVideo) players[index].pauseVideo(); 
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
    }

    function handleMasterTap() {
        if (isUserInteracted) return;
        isUserInteracted = true;
        console.log("Audio Unlocked & Splash Cleared");

        players.forEach((p) => {
            if (p && p.unMute) {
                p.unMute();
                p.setVolume(100);
                p.playVideo();
            }
        });

        const splash = document.getElementById('unmute-splash');
        if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => { splash.style.display = 'none'; }, 600); 
        }

        document.getElementById('mainNav').classList.add('hidden');
        
        // Finalize UI State
        document.querySelectorAll('iframe').forEach(el => el.style.pointerEvents = 'auto');
        // Overlay is set to pointer-events: none so it blocks top/bottom buttons but allows swipes
        document.querySelectorAll('.interaction-overlay').forEach(el => {
            el.style.pointerEvents = 'none';
        });
    }

    // Auto-hide splash message after 1 second, but keep sensor active
    setTimeout(() => {
        if(!isUserInteracted) {
            const splash = document.getElementById('unmute-splash');
            if(splash) splash.style.opacity = '0';
        }
    }, 1000);

    let lastScroll = 0;
    scroller.onscroll = () => {
        let currentScroll = scroller.scrollTop;
        const nav = document.getElementById('mainNav');
        
        // Logic: Show nav only on significant scroll UP (>15px)
        if (lastScroll - currentScroll > 15) {
            nav.classList.remove('hidden');
        } else if (currentScroll - lastScroll > 15) {
            nav.classList.add('hidden');
        }
        lastScroll = currentScroll;
    };

    document.addEventListener("DOMContentLoaded", () => {
        applyTheme(localStorage.getItem('pimentor-theme') || 'dark');
        fetchShorts();
    });
</script>
</body>
</html>
