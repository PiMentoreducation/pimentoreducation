<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi-Shot Player</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

/* SPLASH */
#unmute-splash {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.5s;
    pointer-events: auto;
}

.splash-content {
    text-align: center;
    color: white;
    pointer-events: none;
}

/* PLAYER */
#pishot-scroller {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
}

.video-card {
    height: 100vh;
    scroll-snap-align: start;
    position: relative;
}

iframe {
    width: 100%;
    height: 100%;
    pointer-events: none;
}
</style>
</head>

<body>

<!-- ✅ FIXED CLICK HANDLER -->
<div id="unmute-splash" onclick="handleMasterTap()">
    <div class="splash-content">
        <h1>🔊 Tap to Unmute</h1>
    </div>
</div>

<div id="pishot-scroller"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const BASE_URL = "https://pimentor-project.onrender.com";
const scroller = document.getElementById('pishot-scroller');

let players = [];
let isUserInteracted = false;

const urlParams = new URLSearchParams(window.location.search);
const category = urlParams.get('cat') || 'All';
const startOrder = urlParams.get('startOrder');

/* ✅ UNIVERSAL VIDEO ID FIX */
function extractVideoId(url) {
    try {
        const u = new URL(url);

        if (u.searchParams.get("v")) {
            return u.searchParams.get("v");
        }

        const parts = u.pathname.split("/");
        return parts.pop() || parts.pop();

    } catch {
        return null;
    }
}

async function fetchShorts() {
    try {
        const res = await fetch(`${BASE_URL}/api/shorts/list?category=${category}`);
        const shorts = await res.json();
        renderShorts(shorts);
    } catch {
        renderShorts([{
            ytUrl: "https://www.youtube.com/watch?v=50OQ-rJ4Hxw",
            title: "Fallback Video",
            category: "Demo"
        }]);
    }
}

function renderShorts(shorts) {
    scroller.innerHTML = shorts.map((s, i) => `
        <div class="video-card" id="card-${i}">
            <div id="player-${i}"></div>
        </div>
    `).join('');

    initPlayers(shorts);
}

function initPlayers(shorts) {
    window.onYouTubeIframeAPIReady = () => createPlayers(shorts);

    if (window.YT && window.YT.Player) {
        createPlayers(shorts);
    }
}

function createPlayers(shorts) {
    shorts.forEach((s, i) => {
        const vidId = extractVideoId(s.ytUrl);
        if (!vidId) return;

        players[i] = new YT.Player(`player-${i}`, {
            videoId: vidId,
            playerVars: {
                autoplay: 1,
                mute: 1,
                controls: 0,
                loop: 1,
                playlist: vidId,
                playsinline: 1,
                modestbranding: 1
            },
            events: {
                onReady: (e) => {
                    e.target.mute();
                    e.target.playVideo();
                    if (i === 0) observe();
                }
            }
        });
    });
}

function observe() {
    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            const index = entry.target.id.split('-')[1];
            const player = players[index];

            if (!player) return;

            if (entry.isIntersecting) {
                if (isUserInteracted) player.unMute();
                player.playVideo();
            } else {
                player.pauseVideo();
            }
        });
    }, { threshold: 0.8 });

    document.querySelectorAll('.video-card').forEach(c => observer.observe(c));
}

/* ✅ FULLY FIXED TAP FUNCTION */
function handleMasterTap() {
    if (isUserInteracted) return;
    isUserInteracted = true;

    players.forEach(p => {
        if (p) {
            p.unMute();
            p.setVolume(100);
        }
    });

    const splash = document.getElementById('unmute-splash');

    if (splash) {
        splash.style.opacity = '0';
        splash.style.pointerEvents = 'none';
        setTimeout(() => splash.remove(), 500);
    }

    document.querySelectorAll('iframe').forEach(el => {
        el.style.pointerEvents = 'auto';
    });
}

document.addEventListener("DOMContentLoaded", fetchShorts);
</script>

</body>
</html>
