<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration | PiMentor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 1. THEME VARIABLES & GLOBAL STYLES --- */
        :root {
            --bg: radial-gradient(circle at top, #0d1117 0%, #010409 100%);
            --accent: #7c4dff;
            --accent-glow: rgba(124, 77, 255, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --card-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        [data-theme="light"] {
            --bg: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 40%, #A8E063 100%);
            --text: #1b4332;
            --accent: #2d6a4f;
            --glass: rgba(255, 255, 255, 0.85);
            --card-border: rgba(45, 106, 79, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s ease; }
        body { background: var(--bg); background-attachment: fixed; color: var(--text); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

        /* --- STARDUST BACKGROUND --- */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.2; z-index: -1;
        }
        /* class option*/
        .searchable-select {
    position: relative;
    width: 100%;
}

.searchable-select input {
    width: 100%;
    padding: 12px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: white;
    outline: none;
    transition: 0.3s;
}

.searchable-select input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
}

.options-list {
    position: absolute;
    top: 110%;
    left: 0;
    width: 100%;
    max-height: 200px;
    overflow-y: auto;
    background: #1a1a1a;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    z-index: 1001;
    display: none;
}

.option-item {
    padding: 10px 15px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 0.9rem;
}

.option-item:hover {
    background: var(--accent);
    color: white;
}

/* Custom Scrollbar for the list */
.options-list::-webkit-scrollbar { width: 5px; }
.options-list::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
        /* --- NAVBAR --- */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 80px; z-index: 1000;
            display: flex; align-items: center; padding: 0 5%;
            background: var(--glass); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--card-border);
        }
        .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; margin-right: auto; text-decoration: none; }
        .logo-img { height: 45px; width: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); filter: drop-shadow(0 0 8px var(--accent)); }
        .logo-text { font-size: 1.5rem; font-weight: 800; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { text-decoration: none; color: inherit; font-weight: 600; opacity: 0.8; }

        /* --- MOBILE DRAWER --- */
        .hamburger { display: none; cursor: pointer; flex-direction: column; gap: 6px; margin-right: 20px; }
        .hamburger span { width: 28px; height: 3px; background: var(--text); border-radius: 2px; }
        .sidebar {
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%;
            background: var(--glass); backdrop-filter: blur(25px);
            z-index: 2000; transition: 0.4s ease; padding: 40px 30px; border-right: 1px solid var(--accent);
        }
        .sidebar.open { left: 0; }
        .sidebar-links { display: flex; flex-direction: column; gap: 20px; margin-top: 30px; }
        .sidebar-links a { color: var(--text); text-decoration: none; font-size: 1.1rem; font-weight: 700; }

        /* --- AUTH CARD STYLING --- */
        .auth-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 100px 20px 40px; }
        .auth-card { 
            background: var(--glass); padding: 40px; border-radius: 25px; 
            width: 100%; max-width: 500px; backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .auth-card h1 { margin-bottom: 10px; font-size: 1.8rem; }
        .auth-card p { opacity: 0.7; margin-bottom: 25px; font-size: 0.9rem; }

        /* --- ORIGINAL INPUT STYLING (Retained) --- */
        .auth-card form input, .auth-card form select {
            margin-bottom: 15px; width: 100%; padding: 12px; border-radius: 10px;
            border: 1px solid var(--card-border); background: rgba(255,255,255,0.05);
            color: var(--text); font-size: 1rem;
        }
        [data-theme="light"] .auth-card form input, [data-theme="light"] .auth-card form select { background: #ffffff; }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; }
        .input-group input { flex: 2; margin-bottom: 0 !important; }

        .btn-small {
            flex: 1; height: 45px; padding: 0 10px; font-size: 0.85rem;
            white-space: nowrap; background-color: #4CAF50; color: white;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold;
        }
        .verify-btn { background-color: #2196F3; }
        button:disabled { background-color: #666666 !important; cursor: not-allowed; opacity: 0.5; }

        #otp-container, #registration-fields {
            padding-top: 15px; border-top: 1px dashed var(--card-border); margin-top: 10px;
        }

        #regBtn {
            width: 100%; padding: 14px; background: var(--accent); color: white;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
            font-size: 1.1rem; margin-top: 10px; box-shadow: 0 4px 15px var(--accent-glow);
        }

        .switch a { color: var(--accent); text-decoration: none; font-weight: bold; }

        /* --- THEME TOGGLE (Sidebar) --- */
        .theme-switch-wrapper { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--card-border); }
        .switch-toggle { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch-toggle input { opacity: 0; width: 0; height: 0; }
        .slider-round { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider-round:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider-round { background-color: var(--accent); }
        input:checked + .slider-round:before { transform: translateX(24px); }

        @media (max-width: 900px) {
            .nav-links { display: none; }
            .hamburger { display: flex; order: -1; margin-right: auto; }
            .brand { margin-right: 0; margin-left: auto; }
        }
    </style>
</head>
<body>

<header class="navbar">
    <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
    </div>
    <a href="/index.html" class="brand">
        <img src="/images/OUR_LOGO.png" class="logo-img" alt="pimentor">
        <div class="logo-text">PiMentor</div>
    </a>
    <nav class="nav-links">
        <a href="/index.html">Home</a>
        <a href="/login.html">Login</a>
        <a href="community.html">Community</a>
        <a href="support.html">Support</a>
    </nav>
</header>

<aside class="sidebar" id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <div class="logo-text" style="-webkit-text-fill-color: var(--text);">Menu</div>
        <button id="closeSidebar" style="background:none; border:none; color:var(--text); font-size:2.5rem; cursor:pointer;">&times;</button>
    </div>
    <div class="theme-switch-wrapper">
        <span style="font-weight:700;">Dark Theme</span>
        <label class="switch-toggle">
            <input type="checkbox" id="themeToggle" checked>
            <span class="slider-round"></span>
        </label>
    </div>
    <nav class="sidebar-links">
        <a href="/index.html">Home</a>
        <a href="/login.html">Login</a>
        <a href="community.html">Community</a>
        <a href="support.html">Support</a>
    </nav>
</aside>

<div class="auth-container">
    <div class="auth-card">
        <h1>Join PiMentor</h1>
        <p>Create your student account</p>

        <form id="registerForm">
            <input type="text" id="name" placeholder="Full Name" required>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address" required>
                <button type="button" id="sendOtpBtn" class="btn-small" onclick="handleSendOTP()">Send OTP</button>
            </div>

            <div id="otp-container" style="display: none;">
                <p style="font-size: 0.75rem; color: #777; margin-bottom: 8px;">Check your Gmail inbox for the code.</p>
                <div class="input-group">
                    <input type="text" id="otp-input" placeholder="6-Digit OTP" maxlength="6">
                    <button type="button" class="btn-small verify-btn" onclick="handleVerifyOTP()">Verify Code</button>
                </div>
            </div>

            <div id="registration-fields" style="display: none;">
                <input type="password" id="password" placeholder="Create Password" required>

<div class="searchable-select">
    <input type="text" id="class" placeholder="Search or Select Your Class" autocomplete="off" required>
    <div class="options-list">
        </div>
</div>

<script>
    // Initialize after the DOM is ready
    document.addEventListener('DOMContentLoaded', setupSearchableDropdown);
</script>

                <button type="submit" id="regBtn">Create Account</button>
            </div>
        </form>

        <p class="switch" style="margin-top:20px;">
            Already have an account? <a href="/login.html">Login</a>
        </p>
    </div>
</div>

<script>
/* --- SIDEBAR & THEME LOGIC --- */
const hamburger = document.getElementById('hamburger');
const sidebar = document.getElementById('sidebar');
const closeSidebar = document.getElementById('closeSidebar');
const themeToggle = document.getElementById('themeToggle');

hamburger.onclick = () => sidebar.classList.add('open');
closeSidebar.onclick = () => sidebar.classList.remove('open');

const setTheme = (theme) => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('pimentor-theme', theme);
    themeToggle.checked = theme === 'dark';
};

const savedTheme = localStorage.getItem('pimentor-theme') || 'dark';
setTheme(savedTheme);

themeToggle.addEventListener('change', () => {
    setTheme(themeToggle.checked ? 'dark' : 'light');
});
const ALL_CLASSES = [
    "Class 6", "Class 7", "Class 8", "Class 9", "Class 10", 
    "Class 11 (Science)", "Class 11 (Commerce)", "Class 12 (Science)", "Class 12 (Commerce)",
    "JEE Main", "JEE Advanced", "NEET", "CUET",
    "B.Sc Mathematics", "B.Tech Engineering Math", "M.Sc Mathematics",
    "Higher Math", "CSIR NET", "GATE", "IIT JAM"
];

function setupSearchableDropdown() {
    const input = document.getElementById('class');
    const list = document.querySelector('.options-list');

    function renderOptions(filter = "") {
        list.innerHTML = "";
        const filtered = ALL_CLASSES.filter(c => 
            c.toLowerCase().includes(filter.toLowerCase())
        );
        
        if (filtered.length === 0) {
            list.innerHTML = '<div class="option-item">No results found</div>';
            return;
        }

        filtered.forEach(cls => {
            const item = document.createElement('div');
            item.className = 'option-item';
            item.textContent = cls;
            item.onmousedown = (e) => {
                // We use onmousedown to trigger before the blur event
                input.value = cls;
                list.style.display = 'none';
            };
            list.appendChild(item);
        });
    }

    // Show list on focus
    input.addEventListener('focus', () => {
        list.style.display = 'block';
        renderOptions(input.value);
    });

    // Hide list when clicking away
    input.addEventListener('blur', () => {
        // Timeout allows the click on an option to register first
        setTimeout(() => { list.style.display = 'none'; }, 200);
    });

    // Filter list on typing
    input.addEventListener('input', (e) => {
        list.style.display = 'block';
        renderOptions(e.target.value);
    });
}

// Initialize
document.addEventListener('DOMContentLoaded', setupSearchableDropdown);
/* --- ORIGINAL REGISTRATION LOGIC (Retained Exactly) --- */
let timerOn = false;
const BASE_URL = "https://pimentor-project.onrender.com"; 

function startTimer(remaining) {
    const sendBtn = document.getElementById('sendOtpBtn');
    timerOn = true;
    const interval = setInterval(() => {
        remaining -= 1;
        sendBtn.innerText = `${remaining}s`;
        if (remaining <= 0) {
            clearInterval(interval);
            sendBtn.innerText = "Resend";
            sendBtn.disabled = false;
            timerOn = false;
        }
    }, 1000);
}

async function handleSendOTP() {
    const email = document.getElementById('email').value;
    const sendBtn = document.getElementById('sendOtpBtn');
    if (!email || !email.includes('@')) return alert("Please enter a valid email.");
    sendBtn.disabled = true; sendBtn.innerText = "...";
    try {
        const response = await fetch(`${BASE_URL}/api/auth/send-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, type: 'register' })
        });
        const data = await response.json();
        if (response.ok) {
            alert("OTP Sent!");
            document.getElementById('otp-container').style.display = 'block';
            startTimer(60); 
        } else {
            alert(data.message);
            sendBtn.disabled = false; sendBtn.innerText = "Send OTP";
        }
    } catch (err) {
        alert("Server not responding."); sendBtn.disabled = false;
    }
}

async function handleVerifyOTP() {
    const email = document.getElementById('email').value;
    const otp = document.getElementById('otp-input').value;
    try {
        const response = await fetch(`${BASE_URL}/api/auth/verify-otp`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, otp })
        });
        const data = await response.json();
        if (data.success) {
            alert("Verified!");
            document.getElementById('otp-container').style.display = 'none';
            document.getElementById('sendOtpBtn').style.display = 'none';
            document.getElementById('email').readOnly = true; 
            document.getElementById('registration-fields').style.display = 'block';
        } else { alert(data.message); }
    } catch (err) { alert("Verification failed."); }
}

document.getElementById("registerForm").addEventListener("submit", async function (e) {
  e.preventDefault();
  const btn = document.getElementById("regBtn");
  btn.disabled = true; btn.innerText = "Registering...";
  const payload = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    studentClass: document.getElementById("class").value
  };
  try {
    const res = await fetch(`${BASE_URL}/api/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      alert("Success! Welcome to PiMentor.");
      window.location.href = "login.html";
    } else {
      const data = await res.json();
      alert(data.message || "Failed");
      btn.disabled = false; btn.innerText = "Create Account";
    }
  } catch (err) { alert("Connection error."); btn.disabled = false; }
});
</script>
</body>
</html>
